<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مكتبة المركز — نظام متابعة المهام</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  /* ── Warm Sand Theme ── */
  --bg:#f7f4ef;
  --surface:#ffffff;
  --surface2:#faf7f3;
  --border:#ede8e0;
  --border2:#f0ece5;
  --accent:#b45309;
  --accent2:#92400e;
  --accent-s:#fef3e2;
  --accent-b:#fcd89a;
  --green:#15803d;
  --green-s:#dcfce7;
  --red:#b91c1c;
  --red-s:#fee2e2;
  --amber:#d97706;
  --amber-s:#fef3c7;
  --purple:#6d28d9;
  --purple-s:#ede9fe;
  --teal:#0f766e;
  --pink:#be185d;
  --indigo:#4338ca;
  --text:#1c1006;
  --text2:#57534e;
  --muted:#a8a29e;
  --sidebar:#1c1008;
  --sidebar2:#0f0804;
  --shadow:0 1px 4px rgba(180,83,9,.06),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(180,83,9,.1);
  --sw:230px;
}
/* dark mode: deeper warm dark */
body.dark{
  --bg:#120d07;
  --surface:#1e1410;
  --surface2:#26190f;
  --border:#3a2a18;
  --border2:#2e2012;
  --accent:#f59e0b;
  --accent2:#d97706;
  --accent-s:rgba(245,158,11,.12);
  --accent-b:rgba(245,158,11,.28);
  --green:#34d399;
  --green-s:rgba(52,211,153,.12);
  --red:#f87171;
  --red-s:rgba(248,113,113,.12);
  --amber:#fbbf24;
  --amber-s:rgba(251,191,36,.12);
  --purple:#a78bfa;
  --purple-s:rgba(167,139,250,.12);
  --text:#fdf8f2;
  --text2:#c4b49a;
  --muted:#78624a;
  --sidebar:#100b05;
  --sidebar2:#0a0703;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:"Tajawal",sans-serif;background:var(--bg);color:var(--text);direction:rtl;display:flex;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#d4c4a8;border-radius:4px;}::-webkit-scrollbar-track{background:transparent;}
input,textarea,button,select{font-family:inherit;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sw);background:var(--sidebar);
  display:flex;flex-direction:column;
  position:fixed;right:0;top:0;bottom:0;z-index:50;
  border-left:1px solid rgba(255,255,255,.05);
  transition:background .3s;
}
.sb-logo{
  padding:20px 16px 16px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.sb-logo-inner{
  display:flex;align-items:center;gap:10px;
  background:rgba(180,83,9,.2);border:1px solid rgba(180,83,9,.3);
  border-radius:12px;padding:10px 12px;margin-bottom:8px;
}
.sb-logo-icon{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,#b45309,#92400e);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.sb-logo-text{line-height:1.3;}
.sb-logo-name{font-size:12px;font-weight:700;color:#fff;}
.sb-logo-sub{font-size:8px;color:rgba(255,255,255,.4);letter-spacing:2px;margin-top:1px;}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.sb-section{
  font-size:8px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.25);
  padding:10px 10px 4px;text-transform:uppercase;
}
.stab{
  display:flex;align-items:center;gap:10px;
  padding:9px 11px;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,.45);font-size:12px;font-weight:600;
  transition:all .2s;margin-bottom:2px;position:relative;
  user-select:none;
}
.stab:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);}
.stab.on{background:rgba(180,83,9,.18);color:#fbbf24;}
.stab.on::after{
  content:'';position:absolute;right:0;top:25%;bottom:25%;
  width:3px;background:var(--accent);border-radius:3px 0 0 3px;
}
.stab-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.stab.on .stab-icon{background:rgba(180,83,9,.2);}
.stab-dot{
  width:6px;height:6px;border-radius:50%;background:var(--red);
  position:absolute;top:9px;left:10px;
  box-shadow:0 0 6px var(--red);
}
.sb-bottom{
  padding:10px 8px;border-top:1px solid rgba(255,255,255,.06);
}
.sbtn{
  display:flex;align-items:center;gap:8px;
  padding:8px 11px;border-radius:9px;cursor:pointer;
  color:rgba(255,255,255,.4);font-size:11px;font-weight:600;
  transition:all .2s;background:none;border:none;
  width:100%;margin-bottom:2px;
}
.sbtn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);}
.sbtn span:first-child{font-size:14px;}

/* ── MAIN ── */
.main-wrap{margin-right:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
  transition:background .3s,border-color .3s;
}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.date-nav{display:flex;align-items:center;gap:6px;}
.dnbtn{
  width:28px;height:28px;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.dnbtn:hover{border-color:var(--accent);color:var(--accent);}
.date-lbl{
  background:var(--accent-s);border:1px solid var(--accent-b);
  border-radius:8px;color:var(--accent);
  font-size:11px;font-weight:700;padding:5px 13px;
  cursor:pointer;position:relative;white-space:nowrap;
}

/* ── CONTENT ── */
.main{padding:20px 24px 40px;flex:1;}

/* ── CARDS BASE ── */
.card{
  background:var(--surface);border-radius:14px;
  border:1px solid var(--border);
  box-shadow:0 1px 3px rgba(120,60,10,.06),0 1px 2px rgba(0,0,0,.04);
  transition:background .3s,border-color .3s,box-shadow .2s;
}
.card:hover{box-shadow:0 4px 16px rgba(180,83,9,.1);}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px;}
.stat{
  background:var(--surface);border-radius:14px;border:1px solid var(--border);
  padding:14px 12px;text-align:center;
  box-shadow:var(--shadow);transition:all .2s;
  position:relative;overflow:hidden;
}
.stat::after{
  content:'';position:absolute;top:0;right:0;
  height:3px;width:100%;border-radius:14px 14px 0 0;
}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.stat .si{font-size:20px;margin-bottom:6px;}
.stat .sv{font-size:22px;font-weight:800;line-height:1;}
.stat .sl{font-size:9px;color:var(--muted);margin-top:4px;font-weight:600;letter-spacing:.5px;}
.stat .ctrl{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:7px;}
.stat .ctrl button{
  width:22px;height:22px;border-radius:6px;
  border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;font-size:13px;display:flex;align-items:center;
  justify-content:center;color:var(--muted);font-weight:700;
  transition:all .15s;line-height:1;
}
.stat .ctrl button.p{background:var(--accent);border-color:var(--accent);color:#fff;}
.stat .ctrl button:hover:not(.p){border-color:var(--accent);color:var(--accent);}

/* ── PROGRESS CARD ── */
.prog-card{
  background:var(--surface);border-radius:14px;border:1px solid var(--border);
  padding:16px 20px;margin-bottom:16px;
  display:flex;align-items:center;gap:16px;
  box-shadow:var(--shadow);transition:background .3s,border-color .3s;
}
.pbar{height:7px;background:var(--surface2);border-radius:99px;overflow:hidden;flex:1;}
.pbar-fill{height:100%;border-radius:99px;transition:width .8s ease;}

/* ── SECTION LABEL ── */
.slbl{display:flex;align-items:center;justify-content:space-between;margin:14px 0 10px;}
.slbl .l{display:flex;align-items:center;gap:8px;}
.slbl .bar{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.slbl .tt{font-weight:700;font-size:13px;}
.slbl .bd{padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;}

/* ── TASK CARD ── */
.tc{
  background:var(--surface);border-radius:12px;margin-bottom:7px;
  border:1px solid var(--border);overflow:hidden;
  transition:all .2s;box-shadow:var(--shadow);
}
.tc:hover{box-shadow:var(--shadow-md);}
.tc.done-card{background:var(--green-s);border-color:rgba(22,163,74,.2);}
body.dark .tc.done-card{background:rgba(52,211,153,.06);border-color:rgba(52,211,153,.15);}
.th{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;}
.chk{
  width:20px;height:20px;border-radius:6px;
  border:2px solid var(--border);background:var(--surface);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.chk.on{background:var(--green);border-color:var(--green);}
.task-color-bar{width:3px;height:20px;border-radius:2px;flex-shrink:0;}
.tlbl{flex:1;font-size:12px;font-weight:600;color:var(--text);transition:color .2s;}
.tlbl.dn{color:var(--muted);font-weight:500;}
.tf{
  display:flex;gap:8px;padding:8px 14px 10px;
  background:transparent;border-top:1px solid var(--border-light, var(--border2));
}
.tf input{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;font-family:inherit;font-size:11px;
  color:var(--text);padding:6px 10px;
  transition:border-color .15s;width:auto;
}
.tf input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.tf input.cnt{width:110px;text-align:center;}
.tf input.nt{flex:1;}

/* ── NOTES ── */
.nc{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:14px;box-shadow:var(--shadow);}
.notes-ta{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;font-family:inherit;font-size:12px;
  color:var(--text);padding:10px;resize:vertical;line-height:1.9;
  min-height:90px;transition:border-color .15s;
}
.notes-ta:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:16px;
  backdrop-filter:blur(6px);
}
.modal{
  background:var(--surface);border-radius:18px;padding:24px;
  width:100%;max-width:480px;max-height:85vh;overflow-y:auto;
  border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.pcard{
  display:flex;align-items:center;gap:10px;padding:11px 13px;
  border-radius:10px;border:1px solid var(--border);
  margin-bottom:5px;cursor:pointer;transition:all .15s;
  background:var(--surface2);
}
.pcard:hover,.pcard.sel{border-color:var(--accent);background:rgba(37,99,235,.06);}

/* ── REPORT ── */
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:16px;}
.rc{
  background:var(--surface);border-radius:13px;padding:14px 8px;
  text-align:center;border:1px solid var(--border);
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.rc::after{content:'';position:absolute;top:0;right:0;left:0;height:3px;}
.rc .rv{font-size:20px;font-weight:800;}
.rc .rl{font-size:9px;color:var(--muted);margin-top:3px;font-weight:600;}
.cc{
  background:var(--surface);border-radius:14px;border:1px solid var(--border);
  padding:18px;margin-bottom:14px;box-shadow:var(--shadow);
}
.pfc{
  background:var(--surface);border-radius:14px;border:1px solid var(--border);
  padding:18px;box-shadow:var(--shadow);
}

/* ── LOANS ── */
.loan-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.loan-row:last-child{border-bottom:none;}

/* ── BUTTONS ── */
.btn{cursor:pointer;border:none;border-radius:9px;font-family:inherit;font-weight:700;transition:all .15s;}
.bp{background:var(--accent);color:#fff;padding:8px 18px;font-size:12px;box-shadow:0 2px 8px rgba(180,83,9,.25);border-radius:9px;}
.bp:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(180,83,9,.35);}
.bg2{background:var(--surface2);color:var(--muted);padding:6px 13px;font-size:11px;border:1px solid var(--border);}
.bg2:hover{border-color:var(--accent);color:var(--accent);}

/* ── TWO COL ── */
.today-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}

/* ── INPUT ── */

/* ── AUTOCOMPLETE ── */
.ac-wrap{position:relative;}
.member-checkin-row:hover{background:var(--accent-s) !important;}

.ac-drop{
  position:fixed;z-index:9999;
  background:var(--surface);border:1px solid var(--accent-b);
  border-radius:10px;box-shadow:0 8px 32px rgba(37,99,235,.2);
  max-height:220px;overflow-y:auto;
  min-width:220px;
}
.ac-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;cursor:pointer;transition:background .15s;
  border-bottom:1px solid var(--border2);
}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover{background:var(--accent-s);}
.ac-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--accent-s);border:1px solid var(--accent-b);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0;
}
.ac-info{flex:1;min-width:0;}
.ac-name{font-size:12px;font-weight:700;color:var(--text);}
.ac-meta{font-size:10px;color:var(--muted);margin-top:1px;display:flex;gap:8px;flex-wrap:wrap;}

/* ── VISITOR PROFILE MODAL ── */
.vp-modal{
  background:var(--surface);border-radius:18px;padding:26px;
  width:100%;max-width:440px;
  border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.vp-header{
  background:linear-gradient(135deg,#1e293b,var(--accent));
  border-radius:12px;padding:18px;margin-bottom:20px;color:#fff;
  display:flex;align-items:center;gap:14px;
}
.vp-avatar{
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;flex-shrink:0;
}
.vp-name{font-size:16px;font-weight:800;}
.vp-id{font-size:11px;opacity:.75;margin-top:3px;}
.vp-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;background:var(--surface2);
  border-radius:10px;margin-bottom:8px;border:1px solid var(--border);
}
.vp-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0;}
.vp-label{font-size:10px;color:var(--muted);margin-bottom:2px;}
.vp-val{font-size:13px;font-weight:600;color:var(--text);}
.vp-visits{
  background:var(--accent-s);border:1px solid var(--accent-b);
  border-radius:10px;padding:12px 16px;margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center;
}

.finput{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;font-family:inherit;font-size:12px;
  color:var(--text);padding:8px 12px;transition:all .15s;width:100%;
}
.finput:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(180,83,9,.12);}

/* ── MSG TOAST ── */
.toast{
  position:fixed;top:68px;left:50%;transform:translateX(-50%);
  background:var(--sidebar2);color:#fff;padding:10px 22px;
  border-radius:10px;font-size:13px;z-index:9999;
  border:1px solid rgba(79,142,247,.3);
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  animation:fu .25s ease;
}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
input[type=number]::-webkit-inner-spin-button{opacity:.4;}
input[type=date]{color-scheme:light;}
body.dark input[type=date]{color-scheme:dark;}

@media(max-width:900px){
  .sidebar{width:60px;}
  .sb-logo-text,.stab span:not(.stab-icon),.sb-section,.sbtn span:last-child{display:none;}
  .main-wrap{margin-right:60px;}
  .sb-logo-inner{padding:8px;justify-content:center;}
  .stats-row{grid-template-columns:repeat(3,1fr);}
  .today-grid{grid-template-columns:1fr;}
  .main{padding:14px 14px 40px;}
  .topbar{padding:0 14px;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-inner">
      <div class="sb-logo-icon">📚</div>
      <div class="sb-logo-text">
        <div class="sb-logo-name">مكتبة المركز</div>
        <div class="sb-logo-sub">LIBRARY SYSTEM</div>
      </div>
    </div>
  </div>
  <div class="sb-nav">
    <div class="sb-section">الرئيسية</div>
    <div class="stab on" onclick="setTab('today',this)">
      <div class="stab-icon">📋</div><span>اليوم</span>
    </div>
    <div class="stab" onclick="setTab('checkin',this)">
      <div class="stab-icon">🚪</div><span>سجل الدخول</span>
    </div>
    <div class="stab" onclick="setTab('members',this)">
      <div class="stab-icon">👥</div><span>قاعدة المستفيدين</span>
    </div>
    <div class="stab" onclick="setTab('loans',this)">
      <div class="stab-icon">🔄</div><span>الإعارة</span>
    </div>
    <div class="stab" onclick="setTab('reservations',this)" id="resTab">
      <div class="stab-icon">🔔</div><span>الحجوزات</span>
    </div>
    <div class="stab" onclick="setTab('volunteers',this)">
      <div class="stab-icon">🙋</div><span>المتطوعون</span>
    </div>
    <div class="stab" onclick="setTab('devices',this)">
      <div class="stab-icon">💻</div><span>الأجهزة</span>
    </div>
    <div class="sb-section">التقارير</div>
    <div class="stab" onclick="setTab('week',this)">
      <div class="stab-icon">📊</div><span>الأسبوع</span>
    </div>
    <div class="stab" onclick="setTab('month',this)">
      <div class="stab-icon">📈</div><span>الشهر</span>
    </div>
    <div class="stab" onclick="setTab('customrep',this)">
      <div class="stab-icon">🗂</div><span>تقرير مخصص</span>
    </div>
    <div class="stab" onclick="setTab('dayreport',this)">
      <div class="stab-icon">📄</div><span>تقرير اليوم</span>
    </div>
  </div>
  <div class="sb-bottom">
    <button class="sbtn" onclick="syncToSheets()"><span>☁️</span><span>حفظ في Sheets</span></button>
    <button class="sbtn" onclick="loadFromSheets()"><span>🔄</span><span>مزامنة</span></button>
    <button class="sbtn" onclick="exportData()"><span>💾</span><span>تصدير</span></button>
    <label class="sbtn" style="cursor:pointer"><span>📂</span><span>استيراد</span><input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
    <button class="sbtn" onclick="toggleTheme()" id="themeBtn"><span>🌙</span><span>وضع داكن</span></button>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap">
  <div class="topbar">
    <div class="topbar-title" id="pageTitle">اليوم</div>
    <div class="topbar-right">
      <div class="date-nav">
        <button class="dnbtn" onclick="changeDay(-1)">‹</button>
        <label class="date-lbl" id="dateLabel">📅 اليوم
          <input type="date" id="dpick" style="position:absolute;opacity:0;top:0;left:0;width:100%;height:100%;cursor:pointer" onchange="goToDate(this.value)"/>
        </label>
        <button class="dnbtn" onclick="changeDay(1)">›</button>

function loadFromSheets(){
  showMsg("⏳ جاري المزامنة من Sheets...");
  var script=document.createElement("script");
  var cb="cb_"+Date.now();
  var done=false;

  window[cb]=function(res){
    done=true;
    delete window[cb];
    if(script.parentNode) script.remove();
    if(res&&res.ok&&res.data&&Object.keys(res.data).length>0){
      allData=res.data;
      // تأكد من وجود البنية الأساسية
      for(var k in IMP){if(!allData[k])allData[k]=IMP[k];}
      if(!allData._visitors) allData._visitors=[];
      if(!allData._members) allData._members=[];
      if(!allData._volunteers) allData._volunteers=[];
      saveData();
      render();
      showMsg("✅ تمت المزامنة — "+( (allData._visitors||[]).length )+" سجل دخول");
    } else if(res&&res.ok){
      showMsg("☁️ Sheets فارغة — يعمل بالبيانات المحلية");
    } else {
      showMsg("⚠️ لم تُوجد بيانات في Sheets");
    }
  };

  // timeout إذا فشل الاتصال
  setTimeout(function(){
    if(!done){
      done=true;
      delete window[cb];
      if(script.parentNode) script.remove();
      showMsg("⚠️ تعذر الاتصال بـ Sheets — يعمل بالبيانات المحلية ✓");
    }
  }, 8000);

  script.src=GAS_URL+"?action=load&callback="+cb;
  script.onerror=function(){
    if(done) return;
    done=true;
    delete window[cb];
    showMsg("⚠️ تعذر الاتصال — رابط الـ Script قد يكون منتهياً");
  };
  document.head.appendChild(script);
}

function checkoutDevice(){
  var devId=(document.getElementById("dev-select")||{value:""}).value;
  var borrower=(document.getElementById("dev-borrower")||{value:""}).value.trim();
  var date=(document.getElementById("dev-date")||{value:TODAY}).value||TODAY;
  var time=(document.getElementById("dev-time")||{value:""}).value||"";
  var notes=(document.getElementById("dev-notes")||{value:""}).value.trim();
  if(!devId||!borrower){showMsg("⚠️ اختر الجهاز وأدخل اسم المستفيد");return;}
  var dev=(allData._devices||[]).find(function(d){return d.id===devId;});
  if(!dev||dev.available<=0){showMsg("⚠️ لا يوجد جهاز متاح");return;}
  dev.available--;
  if(!allData._deviceLogs)allData._deviceLogs=[];
  allData._deviceLogs.push({id:"dl"+Date.now(),deviceId:devId,borrower:borrower,date:date,time:time,notes:notes,returned:false,returnDate:""});
  saveData();
  var el=document.getElementById("dev-borrower");if(el)el.value="";
  var el2=document.getElementById("dev-notes");if(el2)el2.value="";
  render();
  showMsg("✅ تم تسجيل إخراج الجهاز لـ "+borrower);
}

function returnDevice(logId){
  var log=(allData._deviceLogs||[]).find(function(l){return l.id===logId;});
  if(!log)return;
  log.returned=true;
  log.returnDate=TODAY;
  var dev=(allData._devices||[]).find(function(d){return d.id===log.deviceId;});
  if(dev) dev.available++;
  saveData();render();
  showMsg("✅ تم استلام الجهاز من "+log.borrower);
}

var _PRESERVE_FIELDS=[
  "vName","vPhone","vMember","vReq","vBarcode",  // سجل الدخول
  "vol-name","vol-task","vol-hours","vol-notes",  // المتطوعون
  "lName","lBook","lMid",                          // الإعارة

  "mName","mPhone","mMember","mNotes",             // قاعدة المستفيدين
  "vSearch","vNameSearch","vol-search"             // خانات البحث
];

function render(){
  // ── حفظ قيم الخانات قبل إعادة البناء ──
  var _saved={};
  _PRESERVE_FIELDS.forEach(function(id){
    var el=document.getElementById(id);
    if(el) _saved[id]=el.value;
  });

  // rebuild members map on every render
  window._membersMap={};
  (allData._members||[]).forEach(function(m){ window._membersMap[m.id]=m; });
  window._visitorsMap={};
  (allData._visitors||[]).forEach(function(v){ window._visitorsMap[v.id]=v; });
  const dt=new Date(currentDay);
  const lbl=currentDay===TODAY?`📅 ${DNAMES[dt.getDay()]}`:`${DNAMES[dt.getDay()]} ${dt.getDate()} ${MONTHS[dt.getMonth()]}`;
  const dl=document.getElementById("dateLabel");
  if(dl){dl.childNodes[0].textContent=lbl+" ";dl.querySelector("input").value=currentDay;}
  const resDot=(allData._reservations||[]).filter(r=>!r.received).length>0;
  const rt=document.getElementById("resTab");
  if(rt){const dot=rt.querySelector(".stab-dot");if(resDot&&!dot){const d=document.createElement("span");d.className="stab-dot";rt.appendChild(d);}else if(!resDot&&dot)dot.remove();}
  document.getElementById("content").innerHTML=buildContent();

  // ── إرجاع قيم الخانات بعد إعادة البناء ──
  setTimeout(function(){
    _PRESERVE_FIELDS.forEach(function(id){
      if(_saved[id]){
        var el=document.getElementById(id);
        if(el && !el.value) el.value=_saved[id];
      }
    });
  },0);

  setTimeout(buildMemberListDOM,0);
  setTimeout(buildDevicesListDOM,0);
  setTimeout(function(){
    document.querySelectorAll('[data-dev-id]').forEach(function(btn){
      btn.onclick=function(){showEditDeviceModal(this.getAttribute('data-dev-id'));};});
  },50);
  setTimeout(buildActiveLogsDOM,0);
  setTimeout(buildAllLogsDOM,0);
  setTimeout(buildVisitorMembersList,0);
  setTimeout(buildMembersListDOM,0);
  setTimeout(buildVolunteersListDOM,0);
  document.getElementById("modal").innerHTML=showPicker?buildPicker():showDE?buildDE():"";
}

function buildContent(){
  if(currentTab==="today")return buildToday();
  if(currentTab==="loans")return buildLoans();
  if(currentTab==="reservations")return buildRes();
  if(currentTab==="customrep")return buildCustomRep();
  if(currentTab==="dayreport")return buildDayReport();
  if(currentTab==="visitors")return buildVisitors();
  if(currentTab==="checkin")return buildCheckin();
  if(currentTab==="members")return buildMembers();
  if(currentTab==="volunteers")return buildVolunteers();
  if(currentTab==="devices")return buildDevices();
  return buildRepTab(currentTab);
}

  return`<div class="tc${done?" done-card":""}">
  <div class="th" onclick="tt('${t.id}')">
    <div class="chk${done?" on":""}">
      ${done?`<svg width="11" height="11"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>`:""}
    </div>
    <div class="task-color-bar" style="background:${clr}"></div>

function setQR(type){
  const t=new Date(),fmt=d=>d.toISOString().split("T")[0];let from,to=TODAY;
  if(type==="sunday"){const d=new Date(t);while(d.getDay()!==0)d.setDate(d.getDate()-1);from=fmt(d);}
  else if(type==="week"){const d=t.getDay(),df=d===0?-6:1-d;const m=new Date(t);m.setDate(t.getDate()+df);from=fmt(m);}
  else if(type==="month"){from=fmt(new Date(t.getFullYear(),t.getMonth(),1));}
  else if(type==="last7"){const d=new Date(t);d.setDate(t.getDate()-6);from=fmt(d);}
  else if(type==="last30"){const d=new Date(t);d.setDate(t.getDate()-29);from=fmt(d);}
  window._crFrom=from;window._crTo=to;
  const ef=document.getElementById("crFrom"),et=document.getElementById("crTo");
  if(ef)ef.value=from;if(et)et.value=to;
  genCR();
}

function genCR(){
  const from=document.getElementById("crFrom")?.value;
  const to=document.getElementById("crTo")?.value;
  if(!from||!to||from>to){showMsg("⚠️ تأكد من التواريخ");return;}
  window._crFrom=from; window._crTo=to;
  const sections=window._crSections||{tasks:true,visitors:true,loans:true,reservations:true,devices:true,volunteers:true,details:true};

  function getDates(f,t){const dates=[],cur=new Date(f),end=new Date(t);while(cur<=end){dates.push(cur.toISOString().split("T")[0]);cur.setDate(cur.getDate()+1);}return dates;}
  const dates=getDates(from,to);
  const active=dates.filter(d=>allData[d]);
  const days=active.map(d=>allData[d]);

  // ── مهام ──
  const tb=days.reduce((a,d)=>a+(d.counts?.d1||0),0);
  const tbn=days.reduce((a,d)=>a+(d.counts?.d2||0),0);
  const tr=days.reduce((a,d)=>a+(d.counts?.d4||0),0);
  const tl=days.reduce((a,d)=>a+(d.counts?.d5||0),0);
  const td=days.reduce((a,d)=>a+DAILY.filter(t=>d.tasks?.[t.id]).length,0);
  const rate=active.length?Math.round((td/(active.length*DAILY.length))*100):0;
  const taskRows=DAILY.map(t=>{const dn=days.filter(d=>d.tasks?.[t.id]).length;const pct=active.length?Math.round((dn/active.length)*100):0;const tot=t.hasCount?days.reduce((a,d)=>a+(d.counts?.[t.id]||0),0):null;return{...t,dn,pct,tot};});

  // ── مستفيدون ──
  const allVisitors=allData._visitors||[];
  const periodVisitors=allVisitors.filter(v=>v.date>=from&&v.date<=to);
  const uniqueVis=new Set(periodVisitors.map(v=>v.name)).size;
  const visByDate={};
  periodVisitors.forEach(v=>{if(!visByDate[v.date])visByDate[v.date]=0;visByDate[v.date]++;});

  // ── إعارة ──
  const allLoans=allData._loans||[];
  const periodLoans=allLoans.filter(l=>l.date>=from&&l.date<=to);
  const returnedLoans=periodLoans.filter(l=>l.returned);

  // ── حجوزات ──
  const allRes=allData._reservations||[];
  const periodRes=allRes.filter(r=>r.date>=from&&r.date<=to);

  // ── متطوعون ──
  const allVols=allData._volunteers||[];
  const periodVols=allVols.filter(v=>v.date>=from&&v.date<=to);
  const volHours=periodVols.reduce((a,v)=>a+(parseFloat(v.hours)||0),0);
  const uniqueVols=new Set(periodVols.map(v=>v.name)).size;

  window._crData={from,to,active,days,tb,tbn,tr,tl,rate,taskRows,periodVisitors,uniqueVis,periodLoans,returnedLoans,periodRes,periodVols,volHours,uniqueVols};

  let html='';

    </div>

      <div style="font-size:26px;font-weight:900">${rate}%</div>

function sc(id,v){
  const d=getDay();
  if(!d.counts)d.counts={};
  d.counts[id]=Math.max(0,Number(v)||0);
  saveDay();
  // تحديث الكارت المناسب فوراً
  var val=d.counts[id]||0;
  if(id==="d1"){var e=document.getElementById("stat-d1");if(e)e.textContent=val;}
  if(id==="d4"){var e=document.getElementById("stat-d4");if(e)e.textContent=val;}
  if(id==="d5"){var e=document.getElementById("stat-d5");if(e)e.textContent=(allData._loans||[]).filter(function(l){return l.date===currentDay;}).length;}
  updateProgress();
}

function updateProgress(){
  // حساب التقدم
  const day=getDay();
  const per=(day.periodic||[]).map(id=>PB.find(p=>p.id===id)).filter(Boolean);
  const allIds=[...DAILY.map(t=>t.id),...per.map(t=>t.id)];
  const done=allIds.filter(id=>day.tasks?.[id]).length;
  const rate=allIds.length?Math.round((done/allIds.length)*100):0;
  const rc=rate>=80?"#16a34a":rate>=50?"#d97706":"#dc2626";
  // تحديث دائرة التقدم
  const ring=document.querySelector(".ring-fg");
  if(ring){
    const circ=2*Math.PI*34;
    ring.style.strokeDasharray=circ;
    ring.style.strokeDashoffset=circ*(1-rate/100);
    ring.style.stroke=rc;
  }
  // تحديث النسبة المئوية
  const pctEl=document.querySelector(".ring-pct");
  if(pctEl) pctEl.textContent=rate+"%";
  // تحديث شريط التقدم
  const bar=document.querySelector(".prog-bar-fill");
  if(bar) bar.style.width=rate+"%";
  // تحديث النص
  const desc=document.getElementById("prog-desc");
  if(desc) desc.textContent=done+" من "+allIds.length+" مهمة مكتملة"+(rate===100?" — أداء ممتاز! 🎉":"");
}

function fixPlusInNames(){
  // إصلاح _visitors
  (allData._visitors||[]).forEach(function(v){
    if(v.name&&v.name.includes("+")) v.name=v.name.replace(/\+/g," ");
    if(v.phone&&v.phone.includes("+")&&v.phone.indexOf("+")<2===false) v.phone=v.phone.replace(/\+/g," ");
    if(v.memberId&&v.memberId.includes("+")) v.memberId=v.memberId.replace(/\+/g," ");
    if(v.request&&v.request.includes("+")) v.request=v.request.replace(/\+/g," ");
  });
  // إصلاح _members
  (allData._members||[]).forEach(function(m){
    if(m.name&&m.name.includes("+")) m.name=m.name.replace(/\+/g," ");
    if(m.notes&&m.notes.includes("+")) m.notes=m.notes.replace(/\+/g," ");
  });
  // إصلاح _volunteers
  (allData._volunteers||[]).forEach(function(v){
    if(v.name&&v.name.includes("+")) v.name=v.name.replace(/\+/g," ");
    if(v.task&&v.task.includes("+")) v.task=v.task.replace(/\+/g," ");
    if(v.notes&&v.notes.includes("+")) v.notes=v.notes.replace(/\+/g," ");
  });
  // إصلاح _loans
  (allData._loans||[]).forEach(function(l){
    if(l.name&&l.name.includes("+")) l.name=l.name.replace(/\+/g," ");
    if(l.book&&l.book.includes("+")) l.book=l.book.replace(/\+/g," ");
  });
  // إصلاح ملخصات الأيام
  Object.keys(allData).forEach(function(k){
    if(k.match(/^\d{4}-\d{2}-\d{2}$/)&&allData[k].summary){
      if(allData[k].summary.includes("+"))
        allData[k].summary=allData[k].summary.replace(/\+/g," ");
    }
  });
  saveData();
}

function safeText(t){
  if(!t) return "";
  try{
    // إذا كان النص يحتوي + بدل مسافات
    if(typeof t==="string"&&t.includes("+")){
      var decoded=t.replace(/\+/g," ");
      return decoded;
    }
  }catch(e){}
  return t;
}

function addRes(){
  var n=document.getElementById("rName");
  var m=document.getElementById("rMid");
  var mat=document.getElementById("rMat");
  var rType=document.getElementById("rType");
  var name=n?n.value.trim():"";
  var material=mat?mat.value.trim():"";
  var typeVal=rType?rType.value:"";
  if(!name||!material){showMsg("⚠️ اسم المستفيد والمادة مطلوبان");return;}

  var deviceLogId=null;
  var deviceId=null;

  // إذا كان الحجز جهاز من المستودع
  if(typeVal.startsWith("device:")){
    deviceId=typeVal.replace("device:","");
    var dev=(allData._devices||[]).find(function(d){return d.id===deviceId;});
    if(!dev||dev.available<=0){showMsg("⚠️ لا يوجد جهاز متاح");return;}
    dev.available--;
    if(!allData._deviceLogs)allData._deviceLogs=[];
    deviceLogId="dl"+Date.now();
    allData._deviceLogs.push({
      id:deviceLogId,
      deviceId:deviceId,
      borrower:name,
      date:TODAY,
      time:new Date().toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"}),
      notes:"حجز من خانة الحجوزات — "+material,
      returned:false,
      returnDate:""
    });
  }

  var res=allData._reservations||[];
  var rDate=(document.getElementById("rDate")||{value:TODAY}).value||TODAY;
  var rTimeOut=(document.getElementById("rTimeOut")||{value:""}).value||new Date().toTimeString().slice(0,5);
  var rNotes=(document.getElementById("rNotes")||{value:""}).value.trim();

  res.push({
    id:"r"+Date.now(),
    name:name,
    memberId:m?m.value.trim():"",
    material:material,
    type:typeVal,
    date:rDate,
    timeOut:rTimeOut,
    notes:rNotes,
    received:false,
    receivedDate:"",
    receivedTime:"",
    deviceLogId:deviceLogId
  });
  allData._reservations=res;
  saveData();render();
  if(deviceLogId) showMsg("✅ تم الحجز وخُصم جهاز من المستودع تلقائياً");
  else showMsg("✅ تم تسجيل الحجز");
}
function recvRes(id){
  var now=new Date();
  var recvTime=now.toTimeString().slice(0,5);
  allData._reservations=(allData._reservations||[]).map(function(r){
    if(r.id===id){
      if(r.deviceLogId){
        allData._deviceLogs=(allData._deviceLogs||[]).map(function(l){
          if(l.id===r.deviceLogId){
            var dev=(allData._devices||[]).find(function(d){return d.id===l.deviceId;});
            if(dev) dev.available++;
            return Object.assign({},l,{returned:true,returnDate:TODAY,returnTime:recvTime});
          }
          return l;
        });
      }
      // حساب المدة
      var dur="";
      if(r.timeOut&&recvTime){
        var t1=r.timeOut.split(":").map(Number);
        var t2=recvTime.split(":").map(Number);
        var mins=(t2[0]*60+t2[1])-(t1[0]*60+t1[1]);
        if(mins>0) dur=mins>=60?Math.floor(mins/60)+"س "+(mins%60?mins%60+"د":""):mins+"د";
      }
      return Object.assign({},r,{received:true,receivedDate:TODAY,receivedTime:recvTime,duration:dur});
    }
    return r;
  });
  saveData();render();
  showMsg("✅ تم تسجيل الاستلام");
}
function delRes(id){
  var res=(allData._reservations||[]).find(function(r){return r.id===id;});
  if(res&&res.deviceLogId&&!res.received){
    // إرجاع الجهاز عند حذف الحجز
    allData._deviceLogs=(allData._deviceLogs||[]).map(function(l){
      if(l.id===res.deviceLogId){
        var dev=(allData._devices||[]).find(function(d){return d.id===l.deviceId;});
        if(dev) dev.available++;
        return Object.assign({},l,{returned:true,returnDate:TODAY});
      }
      return l;
    });
  }
  allData._reservations=(allData._reservations||[]).filter(function(r){return r.id!==id;});

// ── LOAN MEMBER SEARCH ──
function loanSearch(q){
  const drop=document.getElementById("lNameDrop");
  if(!q||q.length<1){drop.style.display="none";return;}
  const all=allData._visitors||[];
  const seen=new Set();
  const results=all.filter(v=>{
    const key=v.memberId||v.name;
    if(seen.has(key))return false;
    seen.add(key);
    return (nmatch(v.name,q)||nmatch(v.memberId,q));
  }).slice(0,8);
  if(!results.length){drop.style.display="none";return;}
  drop.innerHTML=results.map(v=>`
    <div class="ac-item" onclick="fillLoanMember(${JSON.stringify(v.name)},${JSON.stringify(v.memberId||'')})">
      <div class="ac-avatar">${v.name.charAt(0)}</div>
      <div class="ac-info">
        <div class="ac-name">${v.name}</div>
        <div class="ac-meta">
          ${v.memberId?`<span>🪪 ${v.memberId}</span>`:""}
          ${v.phone?`<span>📱 ${v.phone}</span>`:""}
        </div>
      </div>
    </div>`).join("");
  // position fixed
  const lInp=document.getElementById("lName");
  if(lInp){
    const rect=lInp.getBoundingClientRect();
    drop.style.top=(rect.bottom+4)+"px";
    drop.style.right=(window.innerWidth-rect.right)+"px";
    drop.style.left=rect.left+"px";
    drop.style.width=rect.width+"px";
  }
  drop.style.display="block";
}

function fillLoanMember(name,mid){
  const n=document.getElementById("lName"),m=document.getElementById("lMid");
  if(n)n.value=name;
  if(m)m.value=mid||"";
  const drop=document.getElementById("lNameDrop");
  if(drop)drop.style.display="none";
}

// ── VISITOR LIVE SEARCH WITH DROPDOWN ──
function visitorTyping(q){
  // update state without re-rendering (keeps focus)
  window._vSearchName = q || '';
  updateVisitorList();
  // autocomplete dropdown
  const drop=document.getElementById("vSearchDrop");
  if(!q||q.length<1){if(drop)drop.style.display="none";return;}
  const all=allData._visitors||[];
  const seen=new Set();
  const results=all.filter(v=>{
    const key=v.id;
    if(seen.has(key))return false;
    seen.add(key);
    return (nmatch(v.name,q)||nmatch(v.memberId,q)||nmatch(v.phone,q));
  }).slice(0,8);
  if(!results.length){if(drop)drop.style.display="none";return;}
  if(drop){
    drop.innerHTML=results.map(v=>`
      <div class="ac-item" onclick="selectVisitorFromDrop('${v.id}')">
        <div class="ac-avatar">${v.name.charAt(0)}</div>
        <div class="ac-info">
          <div class="ac-name">${v.name}</div>
          <div class="ac-meta">
            ${v.memberId?`<span>🪪 ${v.memberId}</span>`:""}
            ${v.phone?`<span>📱 ${v.phone}</span>`:""}
            <span>📅 ${v.date}</span>
          </div>
        </div>
      </div>`).join("");
    // position fixed relative to input
    const inp=document.getElementById("vSearchName");
    if(inp){
      const rect=inp.getBoundingClientRect();
      drop.style.top=(rect.bottom+4)+"px";
      drop.style.right=(window.innerWidth-rect.right)+"px";
      drop.style.left=rect.left+"px";
      drop.style.width=rect.width+"px";
    }
    drop.style.display="block";
  }
}

function selectVisitorFromDrop(id){
  const drop=document.getElementById("vSearchDrop");
  if(drop)drop.style.display="none";
  showVisitorProfile(id);
}

function visitorSearchLive(q){
  visitorTyping(q);
}

// Update the visitor list section WITHOUT full re-render (preserves input focus)
function updateVisitorList(){
  const visitors=allData._visitors||[];
  const searchDate=window._vFilterDate||"";
  const searchName="";
  const showAll=!searchDate&&!searchName;

  let filtered=visitors;
  if(searchName&&searchDate){
    filtered=visitors.filter(v=>
      ((nmatch(v.name,searchName)||nmatch(v.memberId,searchName)||nmatch(v.phone,searchName)))
      && v.date===searchDate
    );
  } else if(searchName){
    filtered=visitors.filter(v=>
      (nmatch(v.name,searchName)||nmatch(v.memberId,searchName)||nmatch(v.phone,searchName))
    );
  } else if(searchDate){
    filtered=visitors.filter(v=>v.date===searchDate);
  }

  const labelTitle=searchName&&searchDate?"نتائج: "+searchName+" في "+searchDate
    :searchName?"نتائج البحث: "+searchName
    :searchDate===TODAY?"مستفيدو اليوم"
    :searchDate?"مستفيدو "+searchDate
    :"جميع المستفيدين";

  // update counter badges
  const el_today=document.getElementById("vis-today-count");
  const el_total=document.getElementById("vis-total-count");
  const el_result=document.getElementById("vis-result-count");
  const el_label=document.getElementById("vis-label");
  const el_list=document.getElementById("vis-list");
  const el_clearBtn=document.getElementById("vis-date-clear");

  if(el_today) el_today.textContent=visitors.filter(v=>v.date===TODAY).length;
  if(el_total) el_total.textContent=visitors.length;
  if(el_result) el_result.textContent=filtered.length;
  if(el_label) el_label.textContent=labelTitle+" ("+filtered.length+")";
  if(el_clearBtn) el_clearBtn.style.display=searchDate&&searchDate!==TODAY?"inline-flex":"none";

  if(el_list){
    if(filtered.length===0){
      el_list.innerHTML=`<div style="text-align:center;padding:28px;color:var(--muted);font-size:13px;background:var(--surface);border-radius:14px;border:2px dashed var(--border)">
        <div style="font-size:28px;margin-bottom:8px">🔍</div>
        <div style="font-weight:600;margin-bottom:4px">${searchName||searchDate?"لا توجد نتائج مطابقة":"لا توجد سجلات بعد"}</div>
        <div style="font-size:11px">${searchName||searchDate?"جرب تغيير كلمة البحث أو التاريخ":"سجّل أول مستفيد من القسم الأيمن"}</div>
      </div>`;
    } else {
      const list=showAll?[...filtered].reverse().slice(0,100):filtered;
      el_list.innerHTML=list.map((v,i)=>`
        <div class="card" style="margin-bottom:7px;border-right:3px solid var(--accent);cursor:pointer" onclick="showVisitorProfile('${v.id}')">
          <div style="display:flex;align-items:center;gap:12px;padding:11px 16px">
            <div style="width:34px;height:34px;border-radius:50%;background:var(--accent-s);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--accent);flex-shrink:0;border:1px solid var(--accent-b)">${v.name.charAt(0)}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:13px;color:var(--text)">${v.name}</div>
              <div style="display:flex;gap:8px;margin-top:3px;flex-wrap:wrap;align-items:center">
                ${v.memberId?`<span style="font-size:10px;background:var(--accent-s);color:var(--accent);padding:1px 8px;border-radius:8px;font-weight:700;border:1px solid var(--accent-b)">🪪 ${v.memberId}</span>`:""}
                ${v.phone?`<span style="font-size:11px;color:var(--muted)">📱 ${v.phone}</span>`:""}
                <span style="font-size:11px;color:var(--muted)">🕐 ${v.time}</span>
                <span style="font-size:11px;color:var(--muted)">📅 ${v.date}</span>
              </div>
              ${v.request?`<div style="margin-top:4px;font-size:11px;background:var(--amber-s);color:#b45309;padding:2px 8px;border-radius:6px;border:1px solid rgba(217,119,6,.2);display:inline-block">🛎 ${v.request}</div>`:""}
            </div>
            <button onclick="event.stopPropagation();delVisitor('${v.id}')" class="btn" style="background:var(--red-s);color:var(--red);border:1px solid rgba(220,38,38,.2);padding:5px 11px;font-size:11px;flex-shrink:0">حذف</button>
          </div>
        </div>`).join("")
      +(showAll&&filtered.length>100?`<div style="text-align:center;padding:12px;font-size:11px;color:var(--muted)">يُعرض آخر 100 سجل من ${filtered.length}</div>`:"");
    }
  }
}

function visNameSearch(q){
  window._vNameSearch=q||"";
  // update dropdown suggestions
  const drop=document.getElementById("vNameDrop");
  if(drop){
    if(!q||q.length<1){drop.style.display="none";}
    else{
      const all=allData._visitors||[];
      const seen=new Set();
      const results=all.filter(v=>{
        const key=v.name+(v.memberId||"");
        if(seen.has(key))return false;seen.add(key);
        return (nmatch(v.name,q)||nmatch(v.memberId,q)||nmatch(v.phone,q));
      }).slice(0,8);
      if(!results.length){drop.style.display="none";}
      else{
        const inp=document.getElementById("vNameSearch");
        if(inp){const r=inp.getBoundingClientRect();drop.style.top=(r.bottom+4)+"px";drop.style.left=r.left+"px";drop.style.right=(window.innerWidth-r.right)+"px";drop.style.width=r.width+"px";}
        drop.innerHTML=results.map(v=>`
          <div class="ac-item" onclick="showVisitorProfile('${v.id}')">
            <div class="ac-avatar">${v.name.charAt(0)}</div>
            <div class="ac-info">
              <div class="ac-name">${v.name}</div>
              <div class="ac-meta">${v.memberId?`<span>🪪 ${v.memberId}</span>`:""} ${v.phone?`<span>📱 ${v.phone}</span>`:""} <span>📅 ${v.date}</span></div>
            </div>
          </div>`).join("");
        drop.style.display="block";
      }
    }
  }
  renderVisList();
}

// تطبيع النص العربي — يعامل كل أشكال الهمزة والألف كحرف واحد
function norm(s){
  if(!s)return "";
  return s
    .replace(/[أإآا]/g,"ا")
    .replace(/[ةه]/g,"ه")
    .replace(/[يى]/g,"ي")
    .replace(/ً-ٟ/g,"")  // حذف التشكيل
    .toLowerCase()
    .trim();
}
function nmatch(text,q){
  return norm(text).includes(norm(q));
}


function visSearch(q){
  window._visSearch=q||"";

  const drop=document.getElementById("vSearchDrop2");
  if(drop){
    if(!q||q.length<1){drop.style.display="none";}

      const members=allData._members||[];
      const results=members.filter(m=>nmatch(m.name,q)||nmatch(m.memberId,q)||nmatch(m.phone,q)).slice(0,8);
      if(!results.length){drop.style.display="none";}
      else{
        const inp=document.getElementById("vSearch");

          const r=inp.getBoundingClientRect();
          const spaceBelow=window.innerHeight-r.bottom;
          const dH=Math.min(220,results.length*52);
          drop.style.top=(spaceBelow<dH+10?(r.top-dH-4):r.bottom+4)+"px";
          drop.style.left=r.left+"px";

function setVRQ(type){
  const t=new Date();
  const fmt=d=>d.toISOString().split("T")[0];
  let from="", to=TODAY;
  if(type==="today"){from=TODAY;}
  else if(type==="yesterday"){const d=new Date(t);d.setDate(d.getDate()-1);from=fmt(d);to=fmt(d);}
  else if(type==="week"){
    // الأسبوع من الأحد (0) إلى الخميس (4)
    const day=t.getDay();
    const diffToSun=day===0?0:day<=4?-day:7-day; // الأحد
    const sun=new Date(t);sun.setDate(t.getDate()+diffToSun);
    const thu=new Date(sun);thu.setDate(sun.getDate()+4); // الخميس
    from=fmt(sun);
    to=fmt(thu)>TODAY?TODAY:fmt(thu);
  }
  else if(type==="month"){from=new Date(t.getFullYear(),t.getMonth(),1).toISOString().split("T")[0];}
  else if(type==="last7"){const d=new Date(t);d.setDate(d.getDate()-6);from=fmt(d);}
  else if(type==="all"){from="";to="";}
  const fe=document.getElementById("vrFrom"), te=document.getElementById("vrTo");
  if(fe)fe.value=from;
  if(te)te.value=to;
  updateVRPreview();
}

function updateVRPreview(){
  const from=document.getElementById("vrFrom")?.value||"";
  const to=document.getElementById("vrTo")?.value||"";
  const prev=document.getElementById("vrPreview");
  if(!prev)return;
  const visitors=allData._visitors||[];
  const filtered=filterVisitorsForReport(visitors,from,to);
  const unique=new Set(filtered.map(v=>v.name)).size;
  const days=[...new Set(filtered.map(v=>v.date))].length;
  const rtype=document.querySelector('input[name="rtype"]:checked')?.value||"full";
  const rtypeLbl=rtype==="full"?"📄 تفصيلي — جميع البيانات":"📊 إجمالي — عدد الزوار فقط";

  if(!from&&!to&&filtered.length===0){
    prev.innerHTML=`<div style="color:var(--muted)">لا توجد سجلات بعد</div>`;
  } else if(filtered.length===0){
    prev.innerHTML=`<div style="color:var(--red);font-weight:600">لا توجد سجلات في هذه الفترة</div>`;
  } else {
    const periodLbl=(!from&&!to)?"جميع السجلات":(from===to?arabDate(from):arabDate(from)+" — "+arabDate(to));
    prev.innerHTML=`
      <div style="display:flex;justify-content:space-around;margin-bottom:10px">
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:900;color:var(--accent)">${filtered.length}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">سجل دخول</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:900;color:var(--green)">${unique}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">مستفيد</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:22px;font-weight:900;color:var(--purple)">${days}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">أيام نشطة</div>
        </div>
      </div>
      <div style="font-size:10px;color:var(--muted);text-align:center">${periodLbl} &nbsp;•&nbsp; ${rtypeLbl}</div>`;
  }
}

function filterVisitorsForReport(visitors,from,to){
  if(!from&&!to) return visitors;
  return visitors.filter(v=>{
    if(from&&to) return v.date>=from && v.date<=to;
    if(from) return v.date>=from;
    if(to) return v.date<=to;
    return true;
  });
}

// بحث من قاعدة البيانات في سجل الدخول
function ciSearchLive(q){
  const drop=document.getElementById("ciDrop");
  if(!q||q.length<1){if(drop)drop.style.display="none";return;}
  const members=allData._members||[];
  const visitors=allData._visitors||[];
  // جمع المستفيدين الفريدين من السجلات
  const seen=new Set();
  const all=[...members,...visitors].filter(v=>{
    const key=v.memberId?v.memberId:v.name;
    if(seen.has(key))return false;seen.add(key);
    return true;
  });
  const results=all.filter(v=>(nmatch(v.name,q)||nmatch(v.memberId,q)||nmatch(v.phone,q))).slice(0,8);
  if(!results.length){if(drop)drop.style.display="none";return;}
  if(drop){
    const inp=document.getElementById("ciSearch");
    if(inp){const r=inp.getBoundingClientRect();drop.style.top=(r.bottom+4)+"px";drop.style.left=r.left+"px";drop.style.right=(window.innerWidth-r.right)+"px";drop.style.width=r.width+"px";}
    drop.innerHTML=results.map(v=>`
      <div class="ac-item" onclick="ciQuickRegister(${JSON.stringify(v.name)},${JSON.stringify(v.phone||'')},${JSON.stringify(v.memberId||'')},${JSON.stringify(v.request||'')})">
        <div class="ac-avatar">${v.name.charAt(0)}</div>
        <div class="ac-info">
          <div class="ac-name">${v.name}</div>
          <div class="ac-meta">
            ${v.memberId?`<span>🪪 ${v.memberId}</span>`:""}
            ${v.phone?`<span>📱 ${v.phone}</span>`:""}
          </div>
        </div>
        <span style="font-size:10px;background:var(--green-s);color:var(--green);padding:2px 8px;border-radius:20px;font-weight:700;flex-shrink:0">تسجيل →</span>
      </div>`).join("");
    drop.style.display="block";
  }
}

function ciQuickRegister(name,phone,memberId,request){
  const drop=document.getElementById("ciDrop");
  if(drop)drop.style.display="none";
  const inp=document.getElementById("ciSearch");
  if(inp)inp.value="";
  const now=new Date();
  const time=now.toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"});
  if(!allData._visitors)allData._visitors=[];
  allData._visitors.push({id:Date.now().toString(),name,phone,memberId,request,date:TODAY,time});
  const day=getDay();day.visitors=(day.visitors||0)+1;
  saveData();
  // update ci-list without full render
  const list=document.getElementById("ci-list");
  if(list){
    const todayList=[...allData._visitors].filter(v=>v.date===TODAY).reverse();
    const count=document.querySelector('[style*="مستفيدو اليوم"]');
    render(); // full render to update count badge
  } else render();
  showMsg("✅ تم تسجيل دخول "+name);
}

// ══ قاعدة المستفيدين ══
function buildMembers(){
  const visitors=allData._visitors||[];
  // استخراج المستفيدين الفريدين (بالاسم أو العضوية)
  const memberMap={};
  visitors.forEach(v=>{
    const key=v.memberId?("m_"+v.memberId):("n_"+v.name);
    if(!memberMap[key]){
      memberMap[key]={name:v.name,phone:v.phone||"",memberId:v.memberId||"",visits:[],lastRequest:v.request||""};
    }
    memberMap[key].visits.push({date:v.date,time:v.time,request:v.request});
    if(v.request) memberMap[key].lastRequest=v.request;
    if(v.phone) memberMap[key].phone=v.phone;
  });
  const members=Object.values(memberMap).sort((a,b)=>b.visits.length-a.visits.length);
  const nameQ=window._mSearch||"";
  const filtered=nameQ?members.filter(m=>(nmatch(m.name,nameQ)||nmatch(m.memberId,nameQ)||nmatch(m.phone,nameQ))):members;

  return`
  <!-- هيدر -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px">
    <div class="card" style="padding:14px;text-align:center;border-top:3px solid #7c3aed">
      <div style="font-size:24px;font-weight:800;color:#7c3aed">${members.length}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px;font-weight:600">مستفيد مسجل</div>
    </div>
    <div class="card" style="padding:14px;text-align:center;border-top:3px solid var(--accent)">
      <div style="font-size:24px;font-weight:800;color:var(--accent)">${visitors.length}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px;font-weight:600">إجمالي الزيارات</div>
    </div>
    <div class="card" style="padding:14px;text-align:center;border-top:3px solid var(--green)">
      <div style="font-size:24px;font-weight:800;color:var(--green)">${visitors.filter(v=>v.date===TODAY).length}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px;font-weight:600">حضور اليوم</div>
    </div>
  </div>

  <!-- بحث -->
  <div class="card" style="padding:12px 16px;margin-bottom:14px;overflow:visible;display:flex;align-items:center;gap:10px">
    <div style="width:3px;height:18px;background:#7c3aed;border-radius:2px;flex-shrink:0"></div>
    <span style="font-weight:700;font-size:13px;white-space:nowrap">قاعدة المستفيدين</span>
    <div class="ac-wrap" style="flex:1">
      <input type="text" id="mSearchInp" class="finput"
        placeholder="🔍 ابحث بالاسم أو العضوية أو الجوال..."
        value="${nameQ}"
        oninput="window._mSearch=this.value;renderMemberList()"
        style="width:100%;font-size:12px" autocomplete="off"/>
    </div>
    ${nameQ?`<button onclick="window._mSearch='';var e=document.getElementById('mSearchInp');if(e)e.value='';renderMemberList()" style="background:var(--muted);border:none;color:#fff;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center">✕</button>`:""}
    <span style="font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0">${filtered.length} مستفيد</span>
    <button onclick="openVisReport()" class="btn bp" style="padding:6px 14px;font-size:11px;flex-shrink:0;white-space:nowrap">📊 تقرير</button>
  </div>

  <!-- القائمة -->
  <div id="member-list"></div>`;
}

function renderMemberList(){
  const inp=document.getElementById("mSearchInp");
  const pos=inp?inp.selectionStart:0;
  buildVisitorMembersList();
  setTimeout(()=>{
    const el=document.getElementById("mSearchInp");
    if(el){el.focus();try{el.setSelectionRange(pos,pos);}catch(e){}}
  },20);
}

function buildVisitorMembersList(){
  var container=document.getElementById("member-list");
  if(!container) return;
  container.innerHTML="";

  var visitors=allData._visitors||[];
  var nameQ=window._mSearch||"";

  // بناء خريطة المستفيدين من سجلات الدخول
  var memberMap={};
  visitors.forEach(function(v){
    var key=v.memberId?("m_"+v.memberId):("n_"+v.name);
    if(!memberMap[key]){
      memberMap[key]={
        _firstId:v.id, // أول سجل لهذا المستفيد
        name:v.name, phone:v.phone||"", memberId:v.memberId||"",
        visits:[], lastRequest:v.request||""
      };
    }
    memberMap[key].visits.push(v);
    if(v.request) memberMap[key].lastRequest=v.request;
    if(v.phone&&!memberMap[key].phone) memberMap[key].phone=v.phone;
    if(v.memberId&&!memberMap[key].memberId) memberMap[key].memberId=v.memberId;
  });

  var members=Object.values(memberMap).sort(function(a,b){return b.visits.length-a.visits.length;});
  var filtered=nameQ
    ? members.filter(function(m){return nmatch(m.name,nameQ)||nmatch(m.memberId,nameQ)||nmatch(m.phone,nameQ);})
    : members;

  if(filtered.length===0){
    container.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:32px;margin-bottom:8px">👥</div><div style="font-size:13px;font-weight:700;color:var(--text)">'+(nameQ?"لا توجد نتائج":"لا يوجد مستفيدون بعد")+'</div></div>';
    return;
  }

  filtered.slice(0,80).forEach(function(m){
    var lastVisit=m.visits[m.visits.length-1];
    var isToday=lastVisit&&lastVisit.date===TODAY;

    var card=document.createElement("div");
    card.className="card";
    card.style.cssText="margin-bottom:7px;border-right:3px solid "+(isToday?"var(--green)":"#7c3aed")+";transition:box-shadow .15s";

    var inner=document.createElement("div");
    inner.style.cssText="display:flex;align-items:center;gap:12px;padding:11px 16px";

    var av=document.createElement("div");
    av.style.cssText="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#6366f1);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0";
    av.textContent=m.name.charAt(0);

    var info=document.createElement("div");
    info.style.cssText="flex:1;min-width:0";
    var nameEl=document.createElement("div");
    nameEl.style.cssText="font-weight:700;font-size:13px;color:var(--text);margin-bottom:3px";
    nameEl.textContent=safeText(m.name);
    var metaEl=document.createElement("div");
    metaEl.style.cssText="display:flex;gap:8px;flex-wrap:wrap;font-size:10px;color:var(--muted)";
    metaEl.innerHTML=
      (m.memberId?'<span style="background:var(--purple-s);color:#7c3aed;padding:1px 7px;border-radius:6px;font-weight:700;border:1px solid rgba(124,58,237,.2)">🪪 '+m.memberId+'</span>':'')
      +(m.phone?'<span>📱 '+m.phone+'</span>':'')
      +'<span>📅 آخر زيارة: '+(lastVisit?lastVisit.date:"-")+'</span>'
      +(isToday?'<span style="background:var(--green-s);color:var(--green);padding:1px 7px;border-radius:6px;font-weight:700;border:1px solid rgba(22,163,74,.2)">✓ حاضر اليوم</span>':'');
    info.appendChild(nameEl);info.appendChild(metaEl);

    var badge=document.createElement("div");
    badge.style.cssText="text-align:center;background:var(--purple-s);border-radius:10px;padding:7px 12px;flex-shrink:0;border:1px solid rgba(124,58,237,.15)";
    badge.innerHTML='<div style="font-size:16px;font-weight:800;color:#7c3aed">'+m.visits.length+'</div><div style="font-size:9px;color:#7c3aed;font-weight:600">زيارة</div>';

    // زر دخول سريع
    var enterBtn=document.createElement("button");
    enterBtn.className="btn";
    enterBtn.style.cssText="background:var(--green-s);color:var(--green);border:1px solid rgba(22,163,74,.2);padding:6px 10px;font-size:11px;font-weight:700;border-radius:8px;flex-shrink:0;white-space:nowrap";
    enterBtn.textContent="دخول ▸";
    enterBtn.onclick=function(e){e.stopPropagation();showCheckinCard(m.name,m.phone,m.memberId);};

    // زر تعديل البيانات
    var editBtn=document.createElement("button");
    editBtn.className="btn";
    editBtn.style.cssText="background:var(--accent-s);color:var(--accent);border:1px solid var(--accent-b);padding:6px 10px;font-size:11px;font-weight:700;border-radius:8px;flex-shrink:0";
    editBtn.textContent="✏️";
    editBtn.title="تعديل البيانات";
    editBtn.onclick=function(e){
      e.stopPropagation();
      showEditVisitorMember(m);
    };

    // زر حذف كل السجلات
    var delBtn=document.createElement("button");
    delBtn.className="btn";
    delBtn.style.cssText="background:var(--red-s);color:var(--red);border:1px solid rgba(220,38,38,.15);padding:6px 10px;font-size:11px;border-radius:8px;flex-shrink:0;opacity:.7;transition:opacity .15s";
    delBtn.textContent="🗑";
    delBtn.title="حذف كل السجلات";
    delBtn.onclick=function(e){
      e.stopPropagation();
      if(confirm("حذف جميع سجلات "+m.name+" ("+m.visits.length+" زيارة)؟")){
        var ids=m.visits.map(function(v){return v.id;});
        allData._visitors=(allData._visitors||[]).filter(function(v){return ids.indexOf(v.id)===-1;});
        saveData();updateDayVisitorCounter();render();
        showMsg("✅ تم حذف سجلات "+m.name);
      }
    };

    inner.appendChild(av);inner.appendChild(info);inner.appendChild(badge);
    inner.appendChild(enterBtn);inner.appendChild(editBtn);inner.appendChild(delBtn);
    card.appendChild(inner);
    container.appendChild(card);
  });

  if(filtered.length>80){
    var more=document.createElement("div");

// تعديل بيانات مستفيد من قائمة الزيارات
function showEditVisitorMember(m){
  var modal=document.getElementById("modal");
  var bg=document.createElement("div");
  bg.className="modal-bg";
  bg.onclick=function(e){if(e.target===bg){modal.innerHTML="";buildVisitorMembersList();}};

  var box=document.createElement("div");
  box.className="modal";
  box.style.maxWidth="420px";

  var hdr=document.createElement("div");
  hdr.style.cssText="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:16px 18px;background:linear-gradient(135deg,#1c1008,#7c3aed);border-radius:12px;color:#fff";
  hdr.innerHTML='<div style="width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0">'+m.name.charAt(0)+'</div>'
    +'<div><div style="font-weight:800;font-size:15px">تعديل بيانات المستفيد</div>'
    +'<div style="font-size:11px;opacity:.75;margin-top:2px">'+m.visits.length+' زيارة مسجلة</div></div>';
  box.appendChild(hdr);

  var note=document.createElement("div");
  note.style.cssText="font-size:10px;color:var(--muted);background:var(--surface2);padding:8px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:14px";
  note.textContent="التعديل يُطبَّق على جميع سجلات هذا المستفيد ("+m.visits.length+" زيارة)";
  box.appendChild(note);

  function mkF(lbl,fid,val){
    var w=document.createElement("div");
    var l=document.createElement("div");
    l.style.cssText="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:5px";
    l.textContent=lbl;
    var inp=document.createElement("input");
    inp.type="text";inp.id=fid;inp.className="finput";inp.value=val||"";inp.style.width="100%";
    w.appendChild(l);w.appendChild(inp);
    return w;
  }

  var fields=document.createElement("div");
  fields.style.cssText="display:flex;flex-direction:column;gap:10px";
  fields.appendChild(mkF("الاسم *","evm-name",m.name));
  var r1=document.createElement("div");
  r1.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:8px";
  r1.appendChild(mkF("رقم الجوال","evm-phone",m.phone));
  r1.appendChild(mkF("رقم العضوية","evm-member",m.memberId));
  fields.appendChild(r1);
  box.appendChild(fields);

  var btns=document.createElement("div");
  btns.style.cssText="display:flex;gap:8px;margin-top:18px";

  var delAllBtn=document.createElement("button");
  delAllBtn.className="btn";
  delAllBtn.style.cssText="background:var(--red-s);color:var(--red);border:1px solid rgba(220,38,38,.2);padding:9px 12px;font-size:12px;font-weight:700;white-space:nowrap";
  delAllBtn.textContent="🗑 حذف الكل";
  delAllBtn.onclick=function(){
    if(confirm("حذف جميع سجلات "+m.name+" ("+m.visits.length+" زيارة)؟")){
      var ids=m.visits.map(function(v){return v.id;});
      allData._visitors=(allData._visitors||[]).filter(function(v){return ids.indexOf(v.id)===-1;});
      saveData();updateDayVisitorCounter();
      modal.innerHTML="";render();
      showMsg("✅ تم حذف سجلات "+m.name);
    }
  };

  var cancelBtn=document.createElement("button");
  cancelBtn.className="btn bg2";
  cancelBtn.style.cssText="padding:9px 14px;font-size:12px";
  cancelBtn.textContent="إلغاء";
  cancelBtn.onclick=function(){modal.innerHTML="";buildVisitorMembersList();};

  var saveBtn=document.createElement("button");
  saveBtn.className="btn bp";
  saveBtn.style.cssText="flex:1;padding:9px;font-size:13px;font-weight:800";
  saveBtn.textContent="💾 حفظ على الكل";
  saveBtn.onclick=function(){
    var newName=(document.getElementById("evm-name")||{value:""}).value.trim();
    var newPhone=(document.getElementById("evm-phone")||{value:""}).value.trim();
    var newMember=(document.getElementById("evm-member")||{value:""}).value.trim();
    if(!newName){showMsg("⚠️ الاسم مطلوب");return;}
    // حدّث كل السجلات
    var ids=m.visits.map(function(v){return v.id;});
    allData._visitors=(allData._visitors||[]).map(function(v){
      if(ids.indexOf(v.id)!==-1){
        return Object.assign({},v,{name:newName,phone:newPhone,memberId:newMember});
      }
      return v;
    });
    // حدّث في allData._members أيضاً
    allData._members=(allData._members||[]).map(function(x){
      if(nmatch(x.name,m.name)||(m.memberId&&x.memberId===m.memberId)){
        return Object.assign({},x,{name:newName,phone:newPhone,memberId:newMember});
      }
      return x;
    });
    saveData();
    modal.innerHTML="";
    render();
    showMsg("✅ تم تعديل بيانات "+newName+" على "+ids.length+" سجل");
  };

  btns.appendChild(delAllBtn);btns.appendChild(cancelBtn);btns.appendChild(saveBtn);
  box.appendChild(btns);
  bg.appendChild(box);
  modal.innerHTML="";
  modal.appendChild(bg);
}

document.addEventListener("click", function(e){

});

// ── بناء قائمة سجلات المتطوعين بـ DOM ──
function buildVolunteersListDOM(){
  var container=document.getElementById("vol-list");
  var summaryEl=document.getElementById("vol-summary");
  if(!container) return;

  var vols=allData._volunteers||[];
  var searchQ=(document.getElementById("vol-search")||{value:""}).value||"";
  var filterDate=(document.getElementById("vol-filter-date")||{value:""}).value||"";

  var filtered=vols;
  if(searchQ) filtered=filtered.filter(function(v){return nmatch(v.name,searchQ)||nmatch(v.task,searchQ);});
  if(filterDate) filtered=filtered.filter(function(v){return v.date===filterDate;});
  filtered=[...filtered].reverse();

  container.innerHTML="";

  if(filtered.length===0){
    var empty=document.createElement("div");
    empty.style.cssText="text-align:center;padding:40px;color:var(--muted);background:var(--surface);border-radius:14px;border:2px dashed var(--border)";
    empty.innerHTML='<div style="font-size:32px;margin-bottom:8px">🙋</div><div style="font-size:13px;font-weight:700;color:var(--text)">لا توجد سجلات</div><div style="font-size:11px;margin-top:4px">سجّل ساعات أول متطوع من اليسار</div>';
    container.appendChild(empty);
  } else {
    filtered.forEach(function(v){
      var card=document.createElement("div");
      card.className="card";
      card.style.cssText="margin-bottom:7px;border-right:3px solid var(--accent);transition:box-shadow .15s";
      card.onmouseenter=function(){this.style.boxShadow="0 4px 16px rgba(180,83,9,.1)";};
      card.onmouseleave=function(){this.style.boxShadow="";};

      var inner=document.createElement("div");
      inner.style.cssText="display:flex;align-items:center;gap:12px;padding:11px 16px";

      // avatar
      var av=document.createElement("div");
      av.style.cssText="width:38px;height:38px;border-radius:50%;background:var(--accent-s);border:1.5px solid var(--accent-b);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--accent);flex-shrink:0";
      av.textContent=v.name.charAt(0);

      // info
      var info=document.createElement("div");
      info.style.cssText="flex:1;min-width:0";

      var top=document.createElement("div");
      top.style.cssText="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap";
      var nameEl=document.createElement("span");
      nameEl.style.cssText="font-weight:700;font-size:13px;color:var(--text)";
      nameEl.textContent=v.name;
      top.appendChild(nameEl);
      if(v.task){
        var taskBadge=document.createElement("span");
        taskBadge.style.cssText="font-size:10px;background:var(--amber-s);color:var(--amber);padding:1px 8px;border-radius:8px;font-weight:700;border:1px solid rgba(217,119,6,.2)";
        taskBadge.textContent=v.task;
        top.appendChild(taskBadge);
      }

      var bot=document.createElement("div");
      bot.style.cssText="display:flex;gap:10px;align-items:center;flex-wrap:wrap";
      var dateEl=document.createElement("span");
      dateEl.style.cssText="font-size:11px;color:var(--muted)";
      dateEl.textContent="📅 "+v.date+(v.time?" 🕐 "+v.time:"");
      bot.appendChild(dateEl);
      if(v.notes){
        var notesEl=document.createElement("span");
        notesEl.style.cssText="font-size:11px;color:var(--muted)";
        notesEl.textContent="📝 "+v.notes;
        bot.appendChild(notesEl);
      }
      info.appendChild(top);
      info.appendChild(bot);

      // hours badge
      var hrs=document.createElement("div");
      hrs.style.cssText="text-align:center;background:var(--accent-s);border-radius:10px;padding:8px 14px;flex-shrink:0;border:1px solid var(--accent-b)";
      hrs.innerHTML='<div style="font-size:18px;font-weight:900;color:var(--accent)">'+v.hours+'</div><div style="font-size:9px;color:var(--accent);font-weight:600">ساعة</div>';

      // edit btn
      var edit=document.createElement("button");
      edit.style.cssText="background:var(--accent-s);border:1px solid var(--accent-b);color:var(--accent);cursor:pointer;font-size:11px;padding:5px 10px;border-radius:7px;font-family:inherit;font-weight:700;flex-shrink:0;transition:all .15s";
      edit.textContent="✏️ تعديل";
      edit.onmouseenter=function(){this.style.background="var(--accent)";this.style.color="#fff";};
      edit.onmouseleave=function(){this.style.background="var(--accent-s)";this.style.color="var(--accent)";};
      edit.onclick=function(){showEditVolunteer(v.id);};

      // delete btn
      var del=document.createElement("button");
      del.style.cssText="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:5px;opacity:.4;transition:all .15s;flex-shrink:0";
      del.textContent="✕";
      del.onmouseenter=function(){this.style.opacity="1";this.style.color="var(--red)";};
      del.onmouseleave=function(){this.style.opacity=".4";this.style.color="var(--muted)";};
      del.onclick=function(){delVolunteer(v.id);};

      inner.appendChild(av);inner.appendChild(info);inner.appendChild(hrs);inner.appendChild(edit);inner.appendChild(del);
      card.appendChild(inner);
      container.appendChild(card);
    });
  }

  // ── ملخص المتطوعين ──
  if(summaryEl){
    var vols2=allData._volunteers||[];
    var map={};
    vols2.forEach(function(v){
      if(!map[v.name]) map[v.name]={name:v.name,hours:0,sessions:0,tasks:[]};
      map[v.name].hours+=(parseFloat(v.hours)||0);
      map[v.name].sessions++;
      if(v.task&&!map[v.name].tasks.includes(v.task)) map[v.name].tasks.push(v.task);
    });
    var list=Object.values(map).sort(function(a,b){return b.hours-a.hours;});

    if(list.length===0){
      summaryEl.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">لا توجد بيانات بعد</div>';
      return;
    }
    summaryEl.innerHTML="";
    list.forEach(function(m,i){
      var row=document.createElement("div");
      row.style.cssText="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2)";
      if(i===list.length-1) row.style.borderBottom="none";

      var rank=document.createElement("div");
      rank.style.cssText="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;background:"+(i===0?"#fbbf24":i===1?"#d1d5db":"#e5e7eb")+";color:"+(i===0?"#78350f":"#374151");
      rank.textContent=i+1;

      var info=document.createElement("div");
      info.style.cssText="flex:1;min-width:0";
      var n=document.createElement("div");
      n.style.cssText="font-weight:700;font-size:12px;color:var(--text);margin-bottom:2px";
      n.textContent=m.name;
      var t=document.createElement("div");
      t.style.cssText="font-size:10px;color:var(--muted)";
      t.textContent=m.sessions+" جلسة"+(m.tasks.length?" • "+m.tasks.slice(0,2).join("، "):"");
      info.appendChild(n);info.appendChild(t);

      var hrsEl=document.createElement("div");
      hrsEl.style.cssText="font-size:16px;font-weight:800;color:var(--accent);flex-shrink:0";
      hrsEl.textContent=m.hours.toFixed(1)+" ساعة";

      row.appendChild(rank);row.appendChild(info);row.appendChild(hrsEl);
      summaryEl.appendChild(row);
    });
  }
}

function showEditVolunteer(id){
  var v=(allData._volunteers||[]).find(function(x){return x.id===id;});
  if(!v) return;

  // store ID for save
  window._editVolId=id;

  var modal=document.getElementById("modal");
  modal.innerHTML="";
  var bg=document.createElement("div");
  bg.className="modal-bg";
  bg.onclick=function(e){if(e.target===bg)modal.innerHTML="";};

  var box=document.createElement("div");
  box.className="modal";
  box.style.maxWidth="460px";

  // title
  var title=document.createElement("div");
  title.style.cssText="font-weight:800;font-size:16px;margin-bottom:4px;color:var(--text)";
  title.textContent="✏️ تعديل سجل المتطوع";
  var sub=document.createElement("div");
  sub.style.cssText="font-size:12px;color:var(--muted);margin-bottom:18px";
  sub.textContent=v.name+" — "+v.date;
  box.appendChild(title);box.appendChild(sub);

  // helper: create labeled input
  function makeField(label,type,id2,val){
    var wrap=document.createElement("div");
    var lbl=document.createElement("div");
    lbl.style.cssText="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:5px";
    lbl.textContent=label;
    var inp=document.createElement("input");
    inp.type=type;inp.id=id2;inp.className="finput";inp.value=val||"";
    inp.style.width="100%";
    if(type==="number"){inp.min="0.5";inp.max="12";inp.step="0.5";}
    wrap.appendChild(lbl);wrap.appendChild(inp);
    return wrap;
  }

  var fields=document.createElement("div");
  fields.style.cssText="display:flex;flex-direction:column;gap:10px";
  fields.appendChild(makeField("الاسم","text","ev-name",v.name));
  fields.appendChild(makeField("المهمة","text","ev-task",v.task||""));

  // date+time+hours row
  var row=document.createElement("div");
  row.style.cssText="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px";
  row.appendChild(makeField("التاريخ","date","ev-date",v.date));
  row.appendChild(makeField("وقت الدخول","time","ev-time",v.time||""));
  row.appendChild(makeField("الساعات","number","ev-hours",v.hours));
  fields.appendChild(row);
  fields.appendChild(makeField("ملاحظات","text","ev-notes",v.notes||""));
  box.appendChild(fields);

  // buttons
  var btns=document.createElement("div");
  btns.style.cssText="display:flex;gap:8px;margin-top:18px;justify-content:flex-end";
  var cancel=document.createElement("button");
  cancel.className="btn bg2";cancel.style.padding="9px 18px";cancel.textContent="إلغاء";
  cancel.onclick=function(){modal.innerHTML="";};
  var save=document.createElement("button");
  save.className="btn bp";save.style.cssText="padding:9px 20px;font-weight:800";save.textContent="💾 حفظ التعديل";
  save.onclick=saveEditVolunteer;
  btns.appendChild(cancel);btns.appendChild(save);
  box.appendChild(btns);

  bg.appendChild(box);
  modal.appendChild(bg);
}

function saveEditVolunteer(){
  var id=window._editVolId;
  if(!id) return;
  var name=(document.getElementById("ev-name")||{value:""}).value.trim();
  var task=(document.getElementById("ev-task")||{value:""}).value.trim();
  var date=(document.getElementById("ev-date")||{value:TODAY}).value||TODAY;
  var time=(document.getElementById("ev-time")||{value:""}).value||"";
  var hours=parseFloat((document.getElementById("ev-hours")||{value:""}).value)||0;
  var notes=(document.getElementById("ev-notes")||{value:""}).value.trim();

  if(!name){showMsg("⚠️ الاسم مطلوب");return;}
  if(!hours||hours<=0){showMsg("⚠️ أدخل عدد الساعات");return;}

  allData._volunteers=(allData._volunteers||[]).map(function(v){
    if(v.id===id) return {id:v.id,name:name,task:task,date:date,time:time,hours:hours,notes:notes};
    return v;
  });
  saveData();
  document.getElementById("modal").innerHTML="";
  buildVolunteersListDOM();
  showMsg("✅ تم تعديل السجل بنجاح");
}

// ── إضافة سجل متطوع ──
function addVolunteerLog(){
  var name=(document.getElementById("vol-name")||{value:""}).value.trim();
  var task=(document.getElementById("vol-task")||{value:""}).value.trim();
  var date=(document.getElementById("vol-date")||{value:TODAY}).value||TODAY;
  var hours=parseFloat((document.getElementById("vol-hours")||{value:""}).value)||0;
  var time=(document.getElementById("vol-time")||{value:""}).value||new Date().toTimeString().slice(0,5);
  var notes=(document.getElementById("vol-notes")||{value:""}).value.trim();
  if(!name){showMsg("⚠️ اسم المتطوع مطلوب");return;}
  if(!hours||hours<=0){showMsg("⚠️ أدخل عدد الساعات");return;}
  if(!allData._volunteers) allData._volunteers=[];
  allData._volunteers.push({id:Date.now().toString(),name,task,date,time,hours,notes});
  saveData();
  ["vol-name","vol-task","vol-hours","vol-notes"].forEach(function(id){var e=document.getElementById(id);if(e)e.value="";});
  var te=document.getElementById("vol-time");if(te)te.value=new Date().toTimeString().slice(0,5);
  var de=document.getElementById("vol-date");if(de)de.value=TODAY;
  buildVolunteersListDOM();
  showMsg("✅ تم تسجيل "+hours+" ساعة لـ "+name);
}

// ── حذف سجل متطوع ──
function delVolunteer(id){
  allData._volunteers=(allData._volunteers||[]).filter(function(v){return v.id!==id;});
  saveData();
  buildVolunteersListDOM();
}

// ── بحث اسم متطوع ──
function volNameSearch(q){
  var drop=document.getElementById("volNameDrop");
  if(!drop||!q) {if(drop)drop.style.display="none";return;}
  var vols=allData._volunteers||[];
  var names=[...new Set(vols.map(function(v){return v.name;}))].filter(function(n){return nmatch(n,q);}).slice(0,6);
  if(!names.length){drop.style.display="none";return;}
  var inp=document.getElementById("vol-name");
  if(inp){var r=inp.getBoundingClientRect();drop.style.top=(r.bottom+4)+"px";drop.style.left=r.left+"px";drop.style.right=(window.innerWidth-r.right)+"px";drop.style.width=r.width+"px";}
  drop.innerHTML="";
  names.forEach(function(nm){
    var d=document.createElement("div");d.className="ac-item";
    d.onclick=function(){var e=document.getElementById("vol-name");if(e)e.value=nm;drop.style.display="none";};
    d.innerHTML='<div class="ac-avatar">'+nm.charAt(0)+'</div><div class="ac-info"><div class="ac-name">'+nm+'</div></div>';
    drop.appendChild(d);
  });
  drop.style.display="block";
}

// ── طباعة تقرير المتطوعين ──
function printVolunteersReport(){
  var vols=allData._volunteers||[];
  var searchQ=(document.getElementById("vol-search")||{value:""}).value||"";
  var filterDate=(document.getElementById("vol-filter-date")||{value:""}).value||"";
  var filtered=vols;
  if(searchQ) filtered=filtered.filter(function(v){return nmatch(v.name,searchQ)||nmatch(v.task,searchQ);});
  if(filterDate) filtered=filtered.filter(function(v){return v.date===filterDate;});

  var totalHours=filtered.reduce(function(a,v){return a+(parseFloat(v.hours)||0);},0);
  var uniqueNames=[...new Set(filtered.map(function(v){return v.name;}))];

  // ملخص الأفراد
  var map={};
  filtered.forEach(function(v){
    if(!map[v.name]) map[v.name]={name:v.name,hours:0,sessions:0,tasks:[]};
    map[v.name].hours+=(parseFloat(v.hours)||0);
    map[v.name].sessions++;
    if(v.task&&!map[v.name].tasks.includes(v.task)) map[v.name].tasks.push(v.task);
  });
  var summary=Object.values(map).sort(function(a,b){return b.hours-a.hours;});

  var periodLabel=filterDate?arabDate(filterDate):searchQ?"بحث: "+searchQ:"جميع السجلات";

    +'.stat .v{font-size:22px;font-weight:800;color:#b45309}.stat .l{font-size:10px;color:#78350f;margin-top:3px}'
    +'.sec{font-size:13px;font-weight:800;color:#1c1006;margin:18px 0 10px;padding-bottom:6px;border-bottom:2px solid #b45309}'
    +'table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px}'
