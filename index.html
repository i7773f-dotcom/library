<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="مكتبة المركز"/>
<title>مكتبة المركز — نظام متابعة المهام</title>
<link href="https://fonts.googleapis.com/css2?family=Kufam:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0a1f3d;
  --navy2:#0d2b52;
  --accent:#1a5fb4;
  --accent2:#2a6ed4;
  --gold:#c8a84b;
  --bg:#f0f4fa;
  --card:#ffffff;
  --border:#d4dce8;
  --text:#0d1b2a;
  --muted:#5a6a7e;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Kufam',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#b0bdd4;border-radius:4px}

/* ── HEADER ── */
.header{background:var(--navy);padding:0;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#3a8ef6);display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid rgba(255,255,255,.15)}
.logo-text .name{font-size:15px;font-weight:800;color:#fff;letter-spacing:.5px}
.logo-text .sub{font-size:10px;color:var(--gold);letter-spacing:1px;margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}
.hbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:rgba(255,255,255,.85);font-family:inherit;font-size:11px;font-weight:600;padding:6px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.hbtn:hover{background:rgba(255,255,255,.15);color:#fff}
.hbtn.primary{background:var(--accent);border-color:var(--accent2);color:#fff}
.hbtn.primary:hover{background:var(--accent2)}

/* ── NAV TABS ── */
.nav-bar{background:var(--navy2);border-bottom:1px solid rgba(255,255,255,.08)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:2px}
.tab{padding:12px 18px;font-size:13px;font-weight:600;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:7px;white-space:nowrap;position:relative}
.tab:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.05)}
.tab.on{color:#fff;border-bottom-color:var(--gold)}
.tab-dot{width:7px;height:7px;border-radius:50%;background:var(--red);position:absolute;top:8px;left:8px}
.date-nav{margin-right:auto;display:flex;align-items:center;gap:6px;padding:8px 0}
.dnbtn{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.dnbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.date-lbl{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;font-family:inherit;font-size:12px;font-weight:700;padding:5px 12px;cursor:pointer;position:relative;white-space:nowrap}

/* ── MAIN CONTENT ── */
.main{max-width:1200px;margin:0 auto;padding:12px 24px 30px;width:100%;flex:1}

/* ── CARDS ── */
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);box-shadow:0 1px 6px rgba(0,0,0,.06)}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.stat{background:var(--card);border-radius:10px;border:1px solid var(--border);border-top:3px solid var(--accent);padding:8px 6px;text-align:center;box-sizing:border-box;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:transform .15s}
.stat:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.stat .si{font-size:16px;margin-bottom:2px}
.stat .sv{font-size:18px;font-weight:800}
.stat .sl{font-size:9px;color:var(--muted);margin-top:2px;font-weight:600;letter-spacing:.3px}
.stat .ctrl{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:3px}
.stat .ctrl button{width:20px;height:20px;border-radius:5px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:700;transition:all .15s}
.stat .ctrl button.p{background:var(--accent);border-color:var(--accent);color:#fff}
.today-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start}

/* ── PROGRESS ── */
.prog-card{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.pbar{height:8px;background:#dce3ef;border-radius:99px;overflow:hidden;flex:1}
.pbar-fill{height:100%;border-radius:99px;transition:width .8s ease}

/* ── SECTION LABEL ── */
.slbl{display:flex;align-items:center;justify-content:space-between;margin:10px 0 6px}
.slbl .l{display:flex;align-items:center;gap:9px}
.slbl .bar{width:4px;height:20px;border-radius:2px;flex-shrink:0}
.slbl .tt{font-weight:800;font-size:14px}
.slbl .bd{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}

/* ── TASK CARD ── */
.tc{background:var(--card);border-radius:10px;margin-bottom:6px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .15s}
.tc:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.th{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:var(--card);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk.on{background:var(--accent);border-color:var(--accent)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tlbl{flex:1;font-size:14px;font-weight:700;color:var(--text)}
.tlbl.dn{color:var(--muted)}
.tf{display:flex;gap:8px;padding:8px 16px 12px;background:#f8fafd;border-top:1px solid var(--border)}
.tf input{background:#fff;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);padding:6px 11px;font-weight:500;transition:border-color .15s}
.tf input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,95,180,.12)}
.tf input.cnt{width:100px;text-align:center}.tf input.nt{flex:1}

/* ── NOTES ── */
.nc{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.notes-ta{width:100%;background:#f8fafd;border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;color:var(--text);padding:14px;resize:vertical;line-height:2;min-height:160px;transition:border-color .15s}
.notes-ta:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,95,180,.1)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.25)}
.pcard{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .15s}
.pcard:hover,.pcard.sel{border-color:var(--accent);background:#eef4ff}

/* ── REPORT ── */
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:10px;margin-bottom:16px}
.rc{background:var(--card);border-radius:12px;padding:14px 8px;text-align:center;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.rc .rv{font-size:22px;font-weight:800}.rc .rl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600}
.cc{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.pfc{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}

/* ── LOANS / RES ── */
.loan-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f3f8}
.loan-row:last-child{border-bottom:none}
.days-badge{text-align:center;padding:6px 12px;border-radius:8px;flex-shrink:0}

/* ── BUTTONS ── */
.btn{cursor:pointer;border:none;border-radius:8px;font-family:inherit;font-weight:700;transition:all .15s}
.bp{background:var(--accent);color:#fff;padding:8px 18px;font-size:13px;box-shadow:0 2px 6px rgba(26,95,180,.3)}.bp:hover{background:var(--accent2)}
.bg2{background:var(--bg);color:var(--muted);padding:7px 14px;font-size:12px;border:1px solid var(--border)}.bg2:hover{background:var(--border);color:var(--text)}

@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}.fade{animation:fu .3s ease}
input[type=number]::-webkit-inner-spin-button{opacity:.4}
@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(3,1fr)}
  .main{padding:14px 12px 50px}
  .header-inner{padding:0 14px}
  .tab{padding:10px 12px;font-size:12px}
  .nav-inner{padding:0 8px;overflow-x:auto}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">📚</div>
      <div class="logo-text">
        <div class="name">مكتبة المركز</div>
        <div class="sub">نظام متابعة المهام</div>
      </div>
    </div>
    <div class="header-right">
      <button class="hbtn" onclick="syncToSheets()">☁️ حفظ في Sheets</button>
      <button class="hbtn" onclick="loadFromSheets()">🔄 مزامنة</button>
      <button class="hbtn" onclick="exportData()">💾 حفظ</button>
      <label class="hbtn" style="cursor:pointer">📂 استيراد<input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
    </div>
  </div>
</div>

<!-- NAV TABS -->
<div class="nav-bar">
  <div class="nav-inner">
    <div class="date-nav">
      <button class="dnbtn" onclick="changeDay(-1)">‹</button>
      <label class="date-lbl" id="dateLabel">📅 اليوم
        <input type="date" id="dpick" style="position:absolute;opacity:0;top:0;left:0;width:100%;height:100%;cursor:pointer" onchange="goToDate(this.value)"/>
      </label>
      <button class="dnbtn" onclick="changeDay(1)">›</button>
    </div>
    <div class="tab on" onclick="setTab('today',this)" data-tab="today">📋 اليوم</div>
    <div class="tab" onclick="setTab('week',this)" data-tab="week">📊 الأسبوع</div>
    <div class="tab" onclick="setTab('month',this)" data-tab="month">📈 الشهر</div>
    <div class="tab" onclick="setTab('loans',this)" data-tab="loans">🔄 الإعارة</div>
    <div class="tab" onclick="setTab('reservations',this)" data-tab="reservations" id="resTab">🔔 الحجوزات</div>
    <div class="tab" onclick="setTab('customrep',this)" data-tab="customrep">📊 تقرير مخصص</div>
    <div class="tab" onclick="setTab('dayreport',this)" data-tab="dayreport">📄 تقرير اليوم</div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="content"></div>
<div id="modal"></div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbwLVXEvqfZFwzaa_gADm3i0K2W-hrm4KC9_Qgzw7FNWTNFwF728OdYXASNgfkmwDOzL/exec";
const TODAY=new Date().toISOString().split("T")[0];
const MONTHS=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const DNAMES=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];

const DAILY_DEFAULT=[
  {id:"d1",label:"ترفيف الكتب",icon:"📚",color:"#6366f1",hasCount:true,countLabel:"عدد الكتب"},
  {id:"d2",label:"خدمة المستفيدين",icon:"🤝",color:"#1a5fb4",hasCount:true,countLabel:"عدد المستفيدين"},
  {id:"d3",label:"الأجهزة والطابعات",icon:"🖨",color:"#16a34a",hasCount:false,countLabel:""},
  {id:"d4",label:"خدمة الباحثين",icon:"🔍",color:"#d97706",hasCount:true,countLabel:"عدد الباحثين"},
  {id:"d5",label:"الإعارة والإرجاع",icon:"🔄",color:"#b91c8a",hasCount:true,countLabel:"عدد العمليات"},
  {id:"d6",label:"تقرير البوابة",icon:"🚪",color:"#0891b2",hasCount:false,countLabel:""},
];
let DAILY=[...DAILY_DEFAULT];
try{const s=localStorage.getItem("lib_daily_tasks");if(s)DAILY=JSON.parse(s);}catch{}
function saveDailyTasks(){try{localStorage.setItem("lib_daily_tasks",JSON.stringify(DAILY));}catch{}}

const PB=[
  {id:"p1",label:"الإعارة والإرجاع",icon:"🔄",color:"#b91c8a"},
  {id:"p2",label:"لصق الباركود وشرائح RFID",icon:"🏷",color:"#6366f1"},
  {id:"p3",label:"تنفيذ الجرد الدوري",icon:"📊",color:"#d97706"},
  {id:"p4",label:"إدخال المواد الجديدة",icon:"📦",color:"#16a34a"},
  {id:"p5",label:"متابعة استلام المواد وتجهيزها",icon:"📬",color:"#16a34a"},
  {id:"p6",label:"تجهيز المواد للباحثين",icon:"📁",color:"#d97706"},
  {id:"p7",label:"دعم أعمال الرقمنة",icon:"💻",color:"#7c3aed"},
  {id:"p8",label:"إعداد مصدر الأسبوع",icon:"⭐",color:"#0d9488"},
  {id:"p9",label:"تجهيز محتوى الجلسات المعرفية",icon:"🎙",color:"#0d9488"},
  {id:"p10",label:"مراجعة تقارير الحالة الفنية",icon:"📝",color:"#dc2626"},
  {id:"p11",label:"إعداد قوائم التزويد",icon:"📋",color:"#16a34a"},
  {id:"p12",label:"تسجيل العضويات الجديدة",icon:"👤",color:"#1a5fb4"},
  {id:"p13",label:"تنظيم ملفات المشاريع البحثية",icon:"🗂",color:"#b91c8a"},
  {id:"p14",label:"إعداد محتوى رقمي للمكتبة",icon:"🌐",color:"#0d9488"},
  {id:"p15",label:"حل المشاكل التقنية",icon:"🔧",color:"#d97706"},
  {id:"p16",label:"فهرسة الكتب وإدخالها في النظام",icon:"🗃",color:"#6366f1"},
  {id:"p17",label:"ترتيب الأرفف",icon:"📚",color:"#6366f1"},
];

const IMP={"2026-03-31":{"visitors":0,"tasks":{"d3":true},"counts":{},"notes":{"d1":"يوجد ترفيف نهائي بعد اعمال الفهرسة","d2":"لم يبدأ استقبال المستفيدين","d3":"لا توجد مشاكل","d5":"لم يبدأ استقبال المستفيدين"},"periodic":[],"freeNotes":[]},"2026-04-01":{"visitors":0,"tasks":{"d1":true,"d2":true,"d3":true},"counts":{},"notes":{},"periodic":[],"freeNotes":[]},"2026-04-02":{"visitors":7,"tasks":{"d2":true,"d3":true},"counts":{},"notes":{},"periodic":[],"freeNotes":[]},"2026-04-05":{"visitors":0,"tasks":{"d3":true},"counts":{},"notes":{},"periodic":[],"freeNotes":[]},"2026-04-06":{"visitors":0,"tasks":{"d3":true},"counts":{},"notes":{},"periodic":[],"freeNotes":[]},"2026-04-07":{"visitors":0,"tasks":{"d1":true,"d2":true,"d3":true},"counts":{},"notes":{},"periodic":[],"freeNotes":[]},"2026-04-08":{"visitors":0,"tasks":{"d1":true,"d2":true,"d5":true},"counts":{},"notes":{"d1":"العمل مع قسم الإتصال المؤسسي على طباعة كروت الموظفين","d3":"اضافة لابتوب خاص بالزاور يعرض المنصة | تم التواصل مع قسم تقنية المعلومات","d5":"تحديث قائمة الرجيع واللإنتهاء منها"},"periodic":[],"freeNotes":[]},"2026-04-09":{"visitors":0,"tasks":{"d1":true,"d2":true},"counts":{},"notes":{"d1":"العمل على فرز كتب الفسح واعداد قائمة بها 101 كتاب","d2":"اخر كتاب هو موسوعة الخط العربي 1 (للتذكير)","d3":"طلب لابتوب خاص بالمنصة للزوار | تم التواصل مع قسم تقنية المعلومات","d5":"سيتم التواصل يوم الاحد مع موظف مكتبة يعمل على نظام سيرا"},"periodic":[],"freeNotes":[]},"2026-04-12":{"visitors":0,"tasks":{"d1":true,"d2":true,"d3":true,"d4":true},"counts":{},"notes":{"d1":"تجيهز لابتوب خاص بالمنصة","d2":"العمل على كتب الفسح وتم إضافة 101 كتاب للقائمة بإنتظار","d3":"تجيهز لابتوب خاص بالمنصة | تم التنفيذ | إكمال القائمة","d5":"مقترح قائم ( إضافة ايباد خاص بالمنصة للزوار بدلاً من لابتوب)","d4":"استقبال باحث من قسم التعليم وتوفير مساحة لللأغراض البحثية"},"periodic":[],"freeNotes":[]}};
let allData={};
try{allData=JSON.parse(localStorage.getItem("lib_light_v1")||"{}");}catch{}
for(const[k,v]of Object.entries(IMP)){if(!allData[k])allData[k]=v;}
saveData();

let currentDay=TODAY, currentTab="today", showPicker=false, showDE=false;

function saveData(){
  // حفظ محلي دائماً وفوري
  try{localStorage.setItem("lib_light_v1",JSON.stringify(allData));}catch(e){showMsg("⚠️ تعذر الحفظ المحلي");}
}
function syncToSheets(){
  // مزامنة يدوية مع Google Sheets عند الطلب فقط
  showMsg("⏳ جاري الحفظ في Sheets...");
  fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save",payload:allData})})
    .then(r=>r.json()).then(res=>{
      if(res.ok)showMsg("✅ تم الحفظ في Sheets");
      else showMsg("⚠️ فشل الحفظ في Sheets");
    }).catch(()=>showMsg("⚠️ تعذر الاتصال بـ Sheets — البيانات محفوظة محلياً ✓"));
}
function loadFromSheets(){
  showMsg("⏳ جاري المزامنة...");
  fetch(GAS_URL+"?action=load").then(r=>r.json()).then(res=>{
    if(res.ok&&res.data&&Object.keys(res.data).length>0){
      allData=res.data;
      for(const[k,v]of Object.entries(IMP)){if(!allData[k])allData[k]=v;}
      saveData();render();showMsg("✅ تمت المزامنة من Sheets");
    } else showMsg("☁️ لا بيانات في Sheets — تم تحميل البيانات المحلية");
  }).catch(()=>{showMsg("⚠️ تعذر الاتصال — يعمل بالبيانات المحلية ✓");});
}
function showMsg(m){const d=document.createElement("div");d.textContent=m;d.style="position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#0a1f3d;color:#fff;padding:9px 20px;border-radius:8px;font-size:13px;z-index:9999;font-family:inherit;border:1px solid rgba(200,168,75,.4);box-shadow:0 4px 12px rgba(0,0,0,.3)";document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}
function exportData(){const b=new Blob([JSON.stringify(allData,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="مكتبة-المركز-"+TODAY+".json";a.click();setTimeout(()=>URL.revokeObjectURL(u),2000);}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{allData=JSON.parse(ev.target.result);saveData();render();showMsg("✅ تم استيراد البيانات!");}catch{showMsg("❌ الملف غير صالح");}};r.readAsText(f);e.target.value="";}

function getDay(){return allData[currentDay]||(allData[currentDay]={visitors:0,tasks:{},counts:{},notes:{},periodic:[],summary:""}),allData[currentDay];}
function saveDay(){allData[currentDay]=getDay();saveData();}
function changeDay(d){const dt=new Date(currentDay);dt.setDate(dt.getDate()+d);currentDay=dt.toISOString().split("T")[0];render();}
function goToDate(v){if(v){currentDay=v;render();}}
function setTab(t,el){currentTab=t;document.querySelectorAll(".tab").forEach(n=>n.classList.remove("on"));if(el)el.classList.add("on");render();}

function gw(){const t=new Date(),d=t.getDay(),df=d===0?-6:1-d;return Array.from({length:7},(_,i)=>{const x=new Date(t);x.setDate(t.getDate()+df+i);return x.toISOString().split("T")[0];});}
function gm(){const t=new Date(),days=new Date(t.getFullYear(),t.getMonth()+1,0).getDate();return Array.from({length:days},(_,i)=>new Date(t.getFullYear(),t.getMonth(),i+1).toISOString().split("T")[0]);}
function arabDate(d){const dt=new Date(d);return`${DNAMES[dt.getDay()]} ${dt.getDate()} ${MONTHS[dt.getMonth()]}`;}
function loanDays(d){return Math.floor((new Date()-new Date(d))/864e5);}
function loanStyle(n){return n<=10?{c:"#16a34a",bg:"#dcfce7",l:"جديد"}:n<=20?{c:"#d97706",bg:"#fef9c3",l:"تنبيه"}:{c:"#dc2626",bg:"#fee2e2",l:"متأخر"};}
function resStyle(n){return n<=2?{c:"#16a34a",bg:"#dcfce7",l:"جديد"}:n<=5?{c:"#d97706",bg:"#fef9c3",l:"تنبيه"}:{c:"#dc2626",bg:"#fee2e2",l:"متأخر"};}
function resDays(d){return Math.floor((new Date()-new Date(d))/864e5);}

function calcRep(dates){
  const days=dates.map(d=>allData[d]).filter(Boolean);
  const dc=days.map(d=>DAILY.filter(t=>d.tasks?.[t.id]).length);
  const td=dc.reduce((a,b)=>a+b,0),tp=days.length*DAILY.length;
  return{rate:tp?Math.round((td/tp)*100):0,totalDone:td,activeDays:days.length,doneCounts:dc,dates,
    visitors:days.reduce((a,d)=>a+(d.visitors||0),0),books:days.reduce((a,d)=>a+(d.counts?.d1||0),0),
    benef:days.reduce((a,d)=>a+(d.counts?.d2||0),0),researchers:days.reduce((a,d)=>a+(d.counts?.d4||0),0),loans:days.reduce((a,d)=>a+(d.counts?.d5||0),0)};
}

function render(){
  // Update date label
  const dt=new Date(currentDay);
  const lbl=currentDay===TODAY?`📅 ${DNAMES[dt.getDay()]}`:`${DNAMES[dt.getDay()]} ${dt.getDate()} ${MONTHS[dt.getMonth()]}`;
  const dl=document.getElementById("dateLabel");
  if(dl){dl.childNodes[0].textContent=lbl+" ";dl.querySelector("input").value=currentDay;}
  // Res dot
  const resDot=(allData._reservations||[]).filter(r=>!r.received).length>0;
  const rt=document.getElementById("resTab");
  if(rt){const dot=rt.querySelector(".tab-dot");if(resDot&&!dot){const d=document.createElement("span");d.className="tab-dot";rt.appendChild(d);}else if(!resDot&&dot)dot.remove();}
  // Content
  document.getElementById("content").innerHTML="<div class=\"fade\">"+buildContent()+"</div>";
  document.getElementById("modal").innerHTML=showPicker?buildPicker():showDE?buildDE():"";
}

function buildContent(){
  if(currentTab==="today")return buildToday();
  if(currentTab==="loans")return buildLoans();
  if(currentTab==="reservations")return buildRes();
  if(currentTab==="customrep")return buildCustomRep();
  if(currentTab==="dayreport")return buildDayReport();
  return buildRepTab(currentTab);
}

    <div class="stat" style="border-top-color:#b91c8a"><div class="si">🔄</div><div class="sv" style="color:#b91c8a">${day.counts?.d5||0}</div><div class="sl">إعارة وإرجاع</div></div>
  </div>
  <div class="prog-card">
    <div style="position:relative;flex-shrink:0;width:66px;height:66px">
      <svg width="66" height="66" style="transform:rotate(-90deg)">
        <circle cx="33" cy="33" r="27" fill="none" stroke="#dce3ef" stroke-width="7"/>
        <circle cx="33" cy="33" r="27" fill="none" stroke="${rc}" stroke-width="7" stroke-linecap="round"

function tc(t,day,rm=false){
  const done=!!(day.tasks?.[t.id]),count=(day.counts?.[t.id])||"",note=(day.notes?.[t.id])||"";
  return`<div class="tc" style="border-right:3px solid ${done?"#16a34a":t.color}">
  <div class="th" onclick="tt('${t.id}')">
    <div class="chk${done?" on":""}">
      ${done?`<svg width="11" height="11"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>`:""}
    </div>
    <span style="font-size:15px">${t.icon}</span>
    <span class="tlbl${done?" dn":""}">${t.label}</span>
    <div class="dot" style="background:${t.color}"></div>
    ${rm?`<button onclick="rp('${t.id}',event)" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:0 4px;flex-shrink:0">✕</button>`:""}
  </div>
  <div class="tf">
    ${t.hasCount?`<input type="number" min="0" class="cnt" placeholder="${t.countLabel}" value="${count}" onchange="sc('${t.id}',this.value)" onclick="event.stopPropagation()"/>`:``}
    <input type="text" class="nt" placeholder="ملاحظات..." value="${note.replace(/"/g,"&quot;")}" onchange="sn('${t.id}',this.value)" onclick="event.stopPropagation()"/>
  </div>
  </div>`;
}

    ${[{l:"نسبة الإنجاز",v:r.rate+"%",i:"🎯",c:rc},{l:"مهام منجزة",v:r.totalDone,i:"✅",c:"var(--accent)"},

function buildDayReport(){
  const day=getDay(),dt=new Date(currentDay);
  const per=(day.periodic||[]).map(id=>PB.find(p=>p.id===id)).filter(Boolean);
  const allT=[...DAILY,...per];
  const doneT=allT.filter(t=>day.tasks?.[t.id]);
  const rate=allT.length?Math.round((doneT.length/allT.length)*100):0;
  const rc=rate>=80?"#16a34a":rate>=50?"#d97706":"#dc2626";
  return`
  <div style="background:linear-gradient(135deg,var(--navy),var(--accent));border-radius:14px;padding:20px 24px;margin-bottom:16px;color:#fff;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--gold)">

function setQR(type){
  const t=new Date(),fmt=d=>d.toISOString().split("T")[0];
  let from,to=TODAY;
  if(type==="sunday"){const d=new Date(t);while(d.getDay()!==0)d.setDate(d.getDate()-1);from=fmt(d);}
  else if(type==="week"){const d=t.getDay(),df=d===0?-6:1-d;const m=new Date(t);m.setDate(t.getDate()+df);from=fmt(m);}
  else if(type==="month"){from=fmt(new Date(t.getFullYear(),t.getMonth(),1));}
  else if(type==="last7"){const d=new Date(t);d.setDate(t.getDate()-6);from=fmt(d);}
  else if(type==="last30"){const d=new Date(t);d.setDate(t.getDate()-29);from=fmt(d);}
  document.getElementById("crFrom").value=from;
  document.getElementById("crTo").value=to;
  genCR();
}

      <div style="font-size:24px;font-weight:800">${rate}%</div><div style="font-size:10px;opacity:.8">نسبة الإنجاز</div>
    </div>
  </div>
  <div class="rg">
    ${[{i:"👥",v:tv,l:"الزوار",c:"var(--accent)"},{i:"📚",v:tb,l:"كتب رُففت",c:"#6366f1"},{i:"🤝",v:tbn,l:"مستفيدون",c:"#1a5fb4"},{i:"🔍",v:tr,l:"باحثون",c:"#d97706"},{i:"🔄",v:tl,l:"إعارة",c:"#b91c8a"}]
      .map(x=>`<div class="rc" style="border-top:3px solid ${x.c}"><div style="font-size:18px;margin-bottom:4px">${x.i}</div><div class="rv" style="color:${x.c}">${x.v}</div><div class="rl">${x.l}</div></div>`).join("")}
  </div>
  <div class="card" style="padding:18px;margin-bottom:12px">
    <div style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:10px">أداء المهام</div>
    ${taskRows.map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f3f8;font-size:13px">
      <span>${t.icon} ${t.label}</span>

// ── Actions ──
function tt(id){const d=getDay();d.tasks[id]=!d.tasks[id];saveDay();render();}
function sc(id,v){const d=getDay();if(!d.counts)d.counts={};d.counts[id]=Math.max(0,Number(v)||0);saveDay();}
function sn(id,v){const d=getDay();if(!d.notes)d.notes={};d.notes[id]=v;saveDay();}
function addV(v){const d=getDay();d.visitors=Math.max(0,(d.visitors||0)+v);saveDay();render();}
function saveSummary(v){const d=getDay();d.summary=v;saveDay();}
function tper(id){const d=getDay();if(!d.periodic)d.periodic=[];if(d.periodic.includes(id)){d.periodic=d.periodic.filter(x=>x!==id);if(d.tasks)d.tasks[id]=false;}else d.periodic.push(id);saveDay();render();}
function rp(id,e){e.stopPropagation();tper(id);}

function retLoan(id){allData._loans=(allData._loans||[]).map(l=>l.id===id?{...l,returned:true,returnDate:TODAY}:l);saveData();render();}
function delLoan(id){allData._loans=(allData._loans||[]).filter(l=>l.id!==id);saveData();render();}
function addRes(){const n=document.getElementById("rName"),m=document.getElementById("rMid"),mat=document.getElementById("rMat");if(!n?.value.trim()||!mat?.value.trim())return;const res=allData._reservations||[];res.push({id:"r"+Date.now(),name:n.value.trim(),memberId:m?.value.trim()||"",material:mat.value.trim(),date:TODAY,received:false});allData._reservations=res;saveData();render();}
function recvRes(id){allData._reservations=(allData._reservations||[]).map(r=>r.id===id?{...r,received:true,receivedDate:TODAY}:r);saveData();render();}
function delRes(id){allData._reservations=(allData._reservations||[]).filter(r=>r.id!==id);saveData();render();}
